<script>
// === DATA & STORAGE ===
const STORE_KEY = 'arborist_v2';
const NOTIFIED_KEY = 'arborist_notified';
const THEME_KEY = 'arborist_theme';
const ONBOARD_KEY = 'arborist_onboarded';
const NOTIF_DISMISSED = 'arborist_notif_dismissed';
const CREDITS_KEY = 'arborist_credits_v1';
const DAILY_BONUS_KEY = 'arborist_daily_bonus';
const SHOP_KEY = 'arborist_shop_v1';
const PWA_SESSION_KEY = 'arborist_pwa_sessions';
let pwaDeferred = null;

const THEME_SKIN_PAIRS = {
  cyberpunk:  'neon',
  aurora:     'void',
  sakura:     'sakura-card',
  solarized:  'paper',
  midnight:   'chrome',
};

let state = {
  tasks: [],
  collapsed: {},
  view: 'all',
  filterPriority: null,
  filterTag: null,
  filterStatus: 'all',
  sortBy: 'created',
  searchQ: '',
  selectedIds: new Set(),
  multiSelect: false,
  detailTaskId: null,
  editBuffer: {},
  activeProjectId: null,
  focusBreadcrumb: []   // [{id, title}] – hierarchy drill-down stack
};

let notifiedIds = new Set();
try { notifiedIds = new Set(JSON.parse(localStorage.getItem(NOTIFIED_KEY) || '[]')); } catch(e){}

let creditsData = {
  balance: 0, lifetime: 0, history: [],
  streak: 0, longestStreak: 0, lastDate: null
};

let shopData = {
  ownedSkins: ['default'],
  ownedThemes: ['midnight'],
  equippedSkin: 'default',
  equippedTheme: 'midnight',
  defaultSkin: 'default'
};

function save() {
  try {
    const s = JSON.parse(JSON.stringify(state));
    s.selectedIds = [];
    s.multiSelect = false;
    s.detailTaskId = null;
    s.editBuffer = {};
    // activeProjectId is persisted as-is
    localStorage.setItem(STORE_KEY, JSON.stringify(s));
  } catch(e) {
    console.warn('Arborist: save failed', e);
  }
}

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      state.tasks = s.tasks || [];
      state.collapsed = s.collapsed || {};
      state.view = s.view || 'all';
      state.filterPriority = s.filterPriority || null;
      state.filterTag = s.filterTag || null;
      state.filterStatus = s.filterStatus || 'all';
      state.sortBy = s.sortBy || 'created';
      state.activeProjectId = s.activeProjectId || null;
    }
  } catch(e) { console.warn('Load error', e); }
}

function saveNotified() {
  localStorage.setItem(NOTIFIED_KEY, JSON.stringify([...notifiedIds]));
}

function loadCredits() {
  try {
    const raw = localStorage.getItem(CREDITS_KEY);
    if (raw) { const d = JSON.parse(raw); Object.assign(creditsData, d); }
  } catch(e) {}
}
function saveCredits() {
  try { localStorage.setItem(CREDITS_KEY, JSON.stringify(creditsData)); } catch(e) {}
}

function loadShop() {
  try {
    const raw = localStorage.getItem(SHOP_KEY);
    if (raw) { const d = JSON.parse(raw); Object.assign(shopData, d); }
  } catch(e) {}
}
function saveShop() {
  try { localStorage.setItem(SHOP_KEY, JSON.stringify(shopData)); } catch(e) {}
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function makeTask(title, parentId = null, depth = 0) {
  return {
    id: uid(), parentId, title: title.trim(),
    notes: '', dueDate: null, dueTime: null,
    reminderEnabled: false, reminderMinutesBefore: 10,
    priority: 'medium', difficulty: 5, tags: [], createdAt: Date.now(),
    completedAt: null, isComplete: false, children: [],
    skin: null, isRecurring: false, recurringInterval: 'daily', depth,
    isProject: false, boardStatus: 'todo'
  };
}

// === TASK TREE ===
function flatTasks() {
  const all = [];
  function walk(tasks) {
    for (const t of tasks) { all.push(t); if (t.children?.length) walk(t.children); }
  }
  walk(state.tasks);
  return all;
}

function findTask(id, tasks = state.tasks) {
  for (const t of tasks) {
    if (t.id === id) return t;
    if (t.children?.length) { const f = findTask(id, t.children); if (f) return f; }
  }
  return null;
}

function findParent(id, tasks = state.tasks, parent = null) {
  for (const t of tasks) {
    if (t.id === id) return parent;
    if (t.children?.length) { const f = findParent(id, t.children, t); if (f !== undefined) return f; }
  }
  return undefined;
}

function findSiblings(id) {
  const parent = findParent(id);
  if (parent === null) return { arr: state.tasks, parent: null };
  if (parent) return { arr: parent.children, parent };
  return { arr: state.tasks, parent: null };
}

function removeTask(id) {
  function rm(arr) {
    const i = arr.findIndex(t => t.id === id);
    if (i !== -1) { arr.splice(i, 1); return true; }
    for (const t of arr) { if (t.children?.length && rm(t.children)) return true; }
    return false;
  }
  rm(state.tasks);
}

function addTask(title, parentId = null) {
  const depth = parentId ? (findTask(parentId)?.depth || 0) + 1 : 0;
  const task = makeTask(title, parentId, depth);
  // Apply default skin from shop settings (only for root tasks or always)
  if (shopData.defaultSkin && shopData.defaultSkin !== 'default') {
    task.skin = shopData.defaultSkin;
  }
  if (parentId) {
    const p = findTask(parentId);
    if (p) { p.children = p.children || []; p.children.push(task); }
  } else {
    state.tasks.unshift(task);
  }
  save();
  return task;
}

function updateTask(id, changes) {
  const t = findTask(id);
  if (!t) return;
  Object.assign(t, changes);
  save();
}

function deleteTask(id) {
  removeTask(id);
  save();
}

function toggleComplete(id) {
  const t = findTask(id);
  if (!t) return;
  const wasComplete = t.isComplete;
  if (t.children?.length) {
    const allDone = t.children.every(c => c.isComplete);
    const newState = !allDone;
    t.children.forEach(c => { c.isComplete = newState; c.completedAt = newState ? Date.now() : null; });
    t.isComplete = newState; t.completedAt = newState ? Date.now() : null;
  } else {
    t.isComplete = !t.isComplete;
    t.completedAt = t.isComplete ? Date.now() : null;
    if (t.isComplete && t.isRecurring) scheduleRecurring(t);
  }
  propagateComplete(id);
  save();
  // Credit hook — only when newly completing (not unchecking)
  if (!wasComplete && t.isComplete) {
    awardTaskCredits(t);
    // Card pop micro-feedback
    requestAnimationFrame(() => {
      const el = document.querySelector(`.tc[data-id="${id}"]`);
      if (el) {
        el.classList.remove('completing');
        void el.offsetWidth;
        el.classList.add('completing');
        el.addEventListener('animationend', () => el.classList.remove('completing'), { once: true });
      }
    });
  }
}

function propagateComplete(id) {
  const all = flatTasks();
  for (const t of all) {
    if (t.children?.length) {
      const done = t.children.filter(c => c.isComplete).length;
      if (done === t.children.length && done > 0) {
        t.isComplete = true; t.completedAt = t.completedAt || Date.now();
      } else {
        t.isComplete = false; t.completedAt = null;
      }
    }
  }
}

function scheduleRecurring(t) {
  const d = new Date(t.dueDate);
  if (t.recurringInterval === 'daily') d.setDate(d.getDate() + 1);
  else if (t.recurringInterval === 'weekly') d.setDate(d.getDate() + 7);
  else if (t.recurringInterval === 'monthly') d.setMonth(d.getMonth() + 1);
  t.dueDate = d.toISOString().slice(0, 10);
  t.isComplete = false; t.completedAt = null;
}

function splitTask(id) {
  const t = findTask(id);
  if (!t || t.children?.length) return;
  const c1 = makeTask('Subtask 1', t.id, t.depth + 1);
  c1.parentId = t.id;
  c1.depth = t.depth + 1;
  const c2 = makeTask('Subtask 2', t.id, t.depth + 1);
  c2.parentId = t.id;
  c2.depth = t.depth + 1;
  t.children = [c1, c2];
  save();
  const el = document.querySelector(`.tc[data-id="${id}"]`);
  if (el) {
    el.classList.add('cracking');
    setTimeout(() => {
      el.classList.remove('cracking');
      renderAll();
      ['_' + c1.id, '_' + c2.id].forEach(fake => {
        const cel = document.querySelector(`.tc[data-id="${c1.id}"], .tc[data-id="${c2.id}"]`);
        if (cel) cel.classList.add('child-enter');
      });
      document.querySelectorAll(`.tc[data-id="${c1.id}"], .tc[data-id="${c2.id}"]`).forEach(cel => {
        cel.classList.add('child-enter');
      });
    }, 520);
  } else {
    renderAll();
  }
}

function getBranchProgress(task) {
  if (!task.children?.length) return null;
  const all = flatDescendants(task);
  const leaves = all.filter(t => !t.children?.length);
  if (!leaves.length) return 0;
  return leaves.filter(t => t.isComplete).length / leaves.length;
}

function flatDescendants(task) {
  const res = [];
  function walk(t) { res.push(t); (t.children || []).forEach(walk); }
  (task.children || []).forEach(walk);
  return res;
}

function getAllTags() {
  const tags = new Set();
  flatTasks().forEach(t => (t.tags || []).forEach(tag => tags.add(tag)));
  return [...tags];
}

function getViewTasks() {
  const all = flatTasks();
  const now = new Date(); const today = toDateStr(now);
  let filtered = all;
  if (state.view === 'today') filtered = all.filter(t => t.dueDate === today);
  else if (state.view === 'upcoming') {
    const max = new Date(); max.setDate(max.getDate() + 7);
    filtered = all.filter(t => t.dueDate && t.dueDate > today && new Date(t.dueDate) <= max);
  } else if (state.view === 'overdue') {
    filtered = all.filter(t => !t.isComplete && isOverdue(t));
  } else if (state.view === 'completed') {
    filtered = all.filter(t => t.isComplete);
  }
  if (state.filterPriority) filtered = filtered.filter(t => t.priority === state.filterPriority);
  if (state.filterTag) filtered = filtered.filter(t => (t.tags || []).includes(state.filterTag));
  if (state.filterStatus === 'active') filtered = filtered.filter(t => !t.isComplete);
  else if (state.filterStatus === 'done') filtered = filtered.filter(t => t.isComplete);
  if (state.searchQ) {
    const q = state.searchQ.toLowerCase();
    filtered = filtered.filter(t => fuzzy(t.title, q) || fuzzy(t.notes || '', q));
  }
  filtered = sortTasks(filtered);
  return filtered;
}

function fuzzy(str, q) {
  if (!str) return false;
  str = str.toLowerCase();
  let si = 0;
  for (let i = 0; i < q.length; i++) {
    si = str.indexOf(q[i], si);
    if (si === -1) return false;
    si++;
  }
  return true;
}

function sortTasks(tasks) {
  return [...tasks].sort((a, b) => {
    if (state.sortBy === 'due') {
      if (!a.dueDate && !b.dueDate) return 0;
      if (!a.dueDate) return 1; if (!b.dueDate) return -1;
      return a.dueDate.localeCompare(b.dueDate);
    } else if (state.sortBy === 'priority') {
      const p = { high: 0, medium: 1, low: 2 };
      return p[a.priority] - p[b.priority];
    } else if (state.sortBy === 'alpha') {
      return a.title.localeCompare(b.title);
    }
    return b.createdAt - a.createdAt;
  });
}

function toDateStr(d) { return d.toISOString().slice(0, 10); }

function isOverdue(t) {
  if (!t.dueDate) return false;
  const now = new Date();
  if (t.dueTime) {
    const due = new Date(t.dueDate + 'T' + t.dueTime);
    return now > due;
  }
  const today = toDateStr(now);
  return t.dueDate < today;
}

function isDueToday(t) {
  return t.dueDate === toDateStr(new Date());
}

function isDueSoon(t) {
  if (!t.dueDate || !t.dueTime || !t.reminderEnabled) return false;
  const due = new Date(t.dueDate + 'T' + t.dueTime);
  const diff = (due - Date.now()) / 60000;
  return diff > 0 && diff <= (t.reminderMinutesBefore || 10);
}

function getCounts() {
  const all = flatTasks();
  const now = new Date(); const today = toDateStr(now);
  const max = new Date(); max.setDate(max.getDate() + 7);
  return {
    all: all.length,
    today: all.filter(t => t.dueDate === today).length,
    upcoming: all.filter(t => t.dueDate && t.dueDate > today && new Date(t.dueDate) <= max).length,
    overdue: all.filter(t => !t.isComplete && isOverdue(t)).length,
    completed: all.filter(t => t.isComplete).length
  };
}

// === RENDER ===
const ic = id => `<svg><use href="#ic-${id}"/></svg>`;

function renderAll() {
  renderNav();
  renderTaskList();
  renderFilterBar();
  updateThemeUI();
}

function renderNav() {
  const counts = getCounts();
  const navItems = [
    { id: 'all', label: 'All Tasks', icon: 'all', count: counts.all },
    { id: 'today', label: 'Today', icon: 'today', count: counts.today },
    { id: 'upcoming', label: 'Upcoming', icon: 'upcoming', count: counts.upcoming },
    { id: 'overdue', label: 'Overdue', icon: 'overdue', count: counts.overdue },
    { id: 'completed', label: 'Completed', icon: 'done', count: counts.completed },
  ];
  const extraItems = [
    { id: 'projects', label: 'Projects', icon: 'kanban', count: null },
    { id: 'forest',   label: 'The Forest', icon: 'leaf', count: null },
    { id: 'shop',     label: 'Shop', icon: 'shop', count: null },
    { id: 'stats',    label: 'Stats', icon: 'stats', count: null },
    { id: 'focus',    label: 'Focus Mode', icon: 'focus', count: null },
  ];
  function mkNav(items, extra, containerId) {
    const c = document.getElementById(containerId);
    if (!c) return;
    let html = '<div class="nav-sec">Views</div>';
    for (const n of items) {
      html += `<div class="ni${state.view === n.id ? ' act' : ''}" data-nav="${n.id}" role="button" tabindex="0">
        ${ic(n.icon)}<span>${n.label}</span>
        ${n.count !== null ? `<span class="cnt">${n.count}</span>` : ''}
      </div>`;
    }
    html += '<div class="nav-sec">More</div>';
    for (const n of extra) {
      html += `<div class="ni${state.view === n.id ? ' act' : ''}" data-nav="${n.id}" role="button" tabindex="0">
        ${ic(n.icon)}<span>${n.label}</span>
      </div>`;
    }
    c.innerHTML = html;
    c.querySelectorAll('[data-nav]').forEach(el => {
      el.addEventListener('click', () => switchView(el.dataset.nav));
      el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') switchView(el.dataset.nav); });
    });
  }
  mkNav(navItems, extraItems, 'sb-nav');
  mkNav(navItems, extraItems, 'mob-sb-nav');
  // Update credit balance display in sidebar
  const cb = document.getElementById('credit-balance');
  if (cb) cb.textContent = (creditsData.balance || 0) + ' ⭐';

  // Bottom nav
  const bnItems = [
    { id: 'all',      label: 'Home',    icon: 'home',   count: counts.overdue },
    { id: 'today',    label: 'Today',   icon: 'today',  count: counts.today },
    { id: 'projects', label: 'Projects',icon: 'kanban', count: null },
    { id: 'forest',   label: 'Forest',  icon: 'leaf',   count: null },
    { id: 'menu',     label: 'Menu',    icon: 'menu',   count: null },
  ];
  const bni = document.getElementById('bni');
  if (bni) {
    bni.innerHTML = bnItems.map(n => `
      <div class="bni-t${state.view === n.id || (n.id === 'menu' && ['overdue','upcoming','completed','stats','shop'].includes(state.view)) ? ' act' : ''}" data-bnav="${n.id}">
        ${ic(n.icon)}
        <span>${n.label}</span>
        ${n.count ? `<span class="bni-badge">${n.count}</span>` : ''}
      </div>
    `).join('');
    bni.querySelectorAll('[data-bnav]').forEach(el => {
      el.addEventListener('click', () => {
        if (el.dataset.bnav === 'menu') { openMobSidebar(); return; }
        switchView(el.dataset.bnav);
      });
    });
  }
}

function switchView(v) {
  if (v === 'focus') { openFocusMode(null); return; }
  if (v !== 'all') state.focusBreadcrumb = [];
  state.view = v;
  const titles = {
    all: 'All Tasks', today: 'Today', upcoming: 'Upcoming',
    overdue: 'Overdue', completed: 'Completed', shop: 'Shop',
    stats: 'Stats', projects: 'Projects', forest: '🌿 The Forest'
  };
  const vt = document.getElementById('view-title');
  if (vt) vt.textContent = titles[v] || v;
  closeMobSidebar();
  save();
  renderAll();
}

function renderFilterBar() {
  const fb = document.getElementById('filter-bar');
  if (!fb) return;
  const tags = getAllTags();
  let html = `
    <div class="fc${state.filterStatus === 'all' ? ' on' : ''}" data-fs="all">All</div>
    <div class="fc${state.filterStatus === 'active' ? ' on' : ''}" data-fs="active">Active</div>
    <div class="fc${state.filterStatus === 'done' ? ' on' : ''}" data-fs="done">Done</div>
    <div class="fc${state.filterPriority === 'high' ? ' on' : ''}" data-fp="high">🔴 High</div>
    <div class="fc${state.filterPriority === 'medium' ? ' on' : ''}" data-fp="medium">🟡 Med</div>
    <div class="fc${state.filterPriority === 'low' ? ' on' : ''}" data-fp="low">🟢 Low</div>
  `;
  tags.forEach(tag => {
    html += `<div class="fc${state.filterTag === tag ? ' on' : ''}" data-ftag="${tag}">#${tag}</div>`;
  });
  html += `<select class="sort-sel" id="sort-sel">
    <option value="created"${state.sortBy === 'created' ? ' selected' : ''}>Newest</option>
    <option value="due"${state.sortBy === 'due' ? ' selected' : ''}>Due Date</option>
    <option value="priority"${state.sortBy === 'priority' ? ' selected' : ''}>Priority</option>
    <option value="alpha"${state.sortBy === 'alpha' ? ' selected' : ''}>A–Z</option>
  </select>`;
  fb.innerHTML = html;
  fb.querySelectorAll('[data-fs]').forEach(el => {
    el.addEventListener('click', () => { state.filterStatus = el.dataset.fs; save(); renderAll(); });
  });
  fb.querySelectorAll('[data-fp]').forEach(el => {
    el.addEventListener('click', () => {
      state.filterPriority = state.filterPriority === el.dataset.fp ? null : el.dataset.fp;
      save(); renderAll();
    });
  });
  fb.querySelectorAll('[data-ftag]').forEach(el => {
    el.addEventListener('click', () => {
      state.filterTag = state.filterTag === el.dataset.ftag ? null : el.dataset.ftag;
      save(); renderAll();
    });
  });
  const ss = document.getElementById('sort-sel');
  if (ss) ss.addEventListener('change', () => { state.sortBy = ss.value; save(); renderAll(); });
}

function renderTaskList() {
  const tl  = document.getElementById('tl');
  const vs  = document.getElementById('v-stats');
  const vsh = document.getElementById('v-shop');
  const vp  = document.getElementById('v-projects');
  const vf  = document.getElementById('v-forest');
  if (!tl) return;

  // Hide all special views
  [tl, vs, vsh, vp, vf].forEach(el => { if (el) el.style.display = 'none'; });

  if (state.view === 'stats') {
    vs.style.display = 'block';
    vs.classList.remove('view-enter'); void vs.offsetWidth; vs.classList.add('view-enter');
    renderStats(vs); return;
  }
  if (state.view === 'shop') {
    vsh.style.display = 'block';
    vsh.classList.remove('view-enter'); void vsh.offsetWidth; vsh.classList.add('view-enter');
    renderShop(vsh); return;
  }
  if (state.view === 'projects') {
    vp.style.display = 'flex';
    vp.style.flexDirection = 'column';
    vp.style.height = '100%';
    vp.style.overflow = 'hidden';
    vp.classList.remove('view-enter'); void vp.offsetWidth; vp.classList.add('view-enter');
    renderProjects(vp); return;
  }
  if (state.view === 'forest') {
    vf.style.display = 'flex';
    vf.style.flexDirection = 'column';
    vf.classList.remove('view-enter'); void vf.offsetWidth; vf.classList.add('view-enter');
    renderForest(vf); return;
  }

  tl.style.display = '';
  tl.classList.remove('view-enter'); void tl.offsetWidth; tl.classList.add('view-enter');

  if (state.view === 'all') {
    // ── Hierarchy Focus Mode ──
    const crumb = state.focusBreadcrumb || [];
    let html = '';

    // Breadcrumb header
    if (crumb.length > 0) {
      html += `<div class="hier-breadcrumb">
        <div class="hier-crumb root" data-crumb-idx="-1">🌿 Root</div>`;
      crumb.forEach((c, i) => {
        html += `<span class="hier-crumb-sep">›</span>
          <div class="hier-crumb${i === crumb.length - 1 ? ' current' : ''}" data-crumb-idx="${i}">${esc(c.title)}</div>`;
      });
      html += '</div>';
    }

    // Determine which tasks to show
    let rootTasks = state.tasks;
    if (crumb.length > 0) {
      const focused = findTask(crumb[crumb.length - 1].id);
      rootTasks = focused ? (focused.children || []) : state.tasks;
    }

    if (!rootTasks.length && !state.tasks.length) {
      html += emptyState('leaf', 'Your forest awaits', 'Add your first task above to get started.');
    } else if (!rootTasks.length) {
      html += emptyState('leaf', 'No sub-tasks here', 'This project has no children yet.');
    } else {
      html += renderTree(rootTasks);
    }
    tl.innerHTML = html;

    // Bind breadcrumb click navigation
    tl.querySelectorAll('[data-crumb-idx]').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.crumbIdx);
        if (idx === -1) state.focusBreadcrumb = [];
        else state.focusBreadcrumb = state.focusBreadcrumb.slice(0, idx + 1);
        renderAll();
      });
    });

  } else {
    const tasks = getViewTasks();
    if (!tasks.length) {
      const msgs = {
        today: ['ic-today', 'Nothing due today', 'Enjoy your free day!'],
        upcoming: ['ic-upcoming', 'Clear horizon', 'No tasks in the next 7 days.'],
        overdue: ['ic-overdue', 'All caught up!', 'No overdue tasks.'],
        completed: ['ic-done', 'Nothing completed yet', 'Check off your first task to see it here.'],
      };
      const [icon, h, p] = msgs[state.view] || ['ic-all', 'No tasks', ''];
      tl.innerHTML = emptyState(icon.replace('ic-', ''), h, p);
    } else {
      tl.innerHTML = tasks.map(t => renderCard(t, t.depth)).join('');
    }
  }
  bindCardEvents(tl);
}

function renderTree(tasks, depth = 0) {
  let html = '';
  for (const t of tasks) {
    html += renderCard(t, depth);
    if (t.children?.length && !state.collapsed[t.id]) {
      html += renderTree(t.children, depth + 1);
    }
  }
  return html;
}

function diffColor(d) {
  if (d <= 3) return '#2d9e5a';
  if (d <= 6) return '#f4a020';
  return '#c01020';
}

function diffDot(d) {
  if (!d || d === 5) return '';
  const c = diffColor(d);
  return `<span class="diff-dot" style="background:${c}" title="Difficulty ${d}/9"></span>`;
}

function renderCard(t, depth = 0) {
  const overdue = !t.isComplete && isOverdue(t);
  const today = isDueToday(t);
  const soon = isDueSoon(t);
  const isBranch = t.children?.length > 0;
  const prog = isBranch ? getBranchProgress(t) : null;
  const isCollapsed = state.collapsed[t.id];
  const sel = state.selectedIds.has(t.id);

  let checkHtml = '';
  if (isBranch) {
    const r = 10; const circ = 2 * Math.PI * r;
    const offset = circ - (prog || 0) * circ;
    checkHtml = `<svg class="pa" viewBox="0 0 24 24"><circle class="pt" cx="12" cy="12" r="${r}"/><circle class="pf" cx="12" cy="12" r="${r}" stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"/></svg>`;
  } else {
    checkHtml = `<div class="cb${t.isComplete ? ' ck' : ''}">
      <svg class="ci"><use href="#ic-check"/></svg>
    </div>`;
  }

  let dateHtml = '';
  if (t.dueDate) {
    if (overdue) dateHtml = `<span class="db od od-pulse">${ic('clock')}Overdue</span>`;
    else if (soon) dateHtml = `<span class="db sn">${ic('clock')}Due soon</span>`;
    else if (today) {
      const lbl = t.dueTime ? `Due at ${t.dueTime}` : 'Due today';
      dateHtml = `<span class="db td">${ic('clock')}${lbl}</span>`;
    } else {
      dateHtml = `<span class="db up">${ic('clock')}${t.dueDate}</span>`;
    }
  }

  const tagsHtml = (t.tags || []).length
    ? `<div class="tgs">${t.tags.map(g => `<span class="tg">#${g}</span>`).join('')}</div>` : '';

  const prioMap = { low: 'Low', medium: 'Med', high: 'High' };
  const prioHtml = `<span class="pp ${t.priority}">${prioMap[t.priority] || 'Med'}</span>`;

  const subtaskCount = t.children?.length || 0;
  const subtaskDone = subtaskCount ? t.children.filter(c => c.isComplete).length : 0;
  const subtaskSummary = isBranch
    ? `<span class="ss">${ic('all')}${subtaskDone}/${subtaskCount}</span>` : '';

  const recurHtml = t.isRecurring
    ? `<span class="ri" title="${t.recurringInterval}">${ic('recur')}</span>` : '';

  const depthClass = `d${Math.min(depth, 5)}`;
  const branchToggle = isBranch
    ? `<span class="exp-btn${isCollapsed ? '' : ' op'}" data-exp="${t.id}">${ic('arrow')}</span>` : '';
  const effectiveSkin = t.skin || shopData.equippedSkin || 'default';
  const skinClass = effectiveSkin !== 'default' ? ` sk-${effectiveSkin}` : '';
  const skinExtras = getSkinExtras(effectiveSkin, t);

  return `<div class="tc${t.isComplete ? ' complete' : ''}${sel ? ' sel' : ''} ${depthClass}${skinClass}" data-id="${t.id}" data-depth="${depth}" draggable="true">
    <div class="sb-right">${ic('check')}</div>
    <div class="sb-left">
      <div class="sab edit" data-edit="${t.id}">${ic('edit')}<span>Edit</span></div>
      <div class="sab del" data-del="${t.id}">${ic('trash')}<span>Del</span></div>
    </div>
    <div class="ti-inner">
      ${skinExtras.bgLayer || ''}
      <div class="ca" data-check="${t.id}" data-id="${t.id}">${checkHtml}</div>
      <div class="tcc">
        <div class="ttr">
          ${branchToggle}
          <span class="tc-title">${esc(t.title)}</span>
          ${diffDot(t.difficulty)}
          ${prioHtml}
          ${t.isProject && t.children?.length ? `<span style="font-size:10px;color:var(--acc-l);background:var(--acc-d);padding:1px 6px;border-radius:6px;font-weight:800;flex-shrink:0;cursor:pointer" title="Entra nel progetto">▶ Enter</span>` : ''}
          ${skinExtras.badge || ''}
        </div>
        <div class="tm">
          ${dateHtml}${subtaskSummary}${recurHtml}
        </div>
        ${tagsHtml}
        <button class="asb" data-add-sub="${t.id}">${ic('plus')}Add subtask</button>
      </div>
      <div class="dh" data-drag-handle="${t.id}">${ic('grip')}</div>
    </div>
  </div>`;
}

function emptyState(icon, h, p) {
  return `<div class="empty-state">
    <svg><use href="#ic-${icon}"/></svg>
    <h3>${h}</h3>
    <p>${p}</p>
  </div>`;
}

// === THE FOREST VIEW ===
function renderForest(el) {
  const all = flatTasks();
  const done = all.filter(t => t.isComplete);

  if (!done.length) {
    el.innerHTML = `<div class="forest-empty">
      <span class="fe-icon">🌱</span>
      <p>Il tuo bosco è ancora vuoto.<br>Completa qualche task per far crescere gli alberi!</p>
    </div>`;
    return;
  }

  // Categorise
  const projects = done.filter(t => t.isProject);
  const tasks    = done.filter(t => !t.isProject && t.depth === 0);
  const subtasks = done.filter(t => !t.isProject && t.depth > 0);

  function treeEmoji(t) {
    if (t.isProject) return '🌳';
    if (t.depth === 0) return '🌲';
    // alternate flower/mushroom by hash of title length
    return (t.title.length % 2 === 0) ? '🌷' : '🍄';
  }

  function treeSize(t) {
    if (t.isProject) return 'tree-size-lg';
    if (t.depth === 0) return 'tree-size-md';
    return 'tree-size-sm';
  }

  function treeCard(t) {
    const emoji = treeEmoji(t);
    const size  = treeSize(t);
    const glow  = (t.difficulty || 5) > 7 ? ' glow' : '';
    const label = t.title.length > 16 ? t.title.slice(0, 15) + '…' : t.title;
    return `<div class="tree-item ${size}" data-tree-id="${t.id}" title="${esc(t.title)}">
      <span class="tree-emoji${glow}">${emoji}</span>
      <span class="tree-label">${esc(label)}</span>
    </div>`;
  }

  // Stats bar
  const glowCount = done.filter(t => (t.difficulty || 5) > 7).length;
  const statsHtml = `<div class="forest-stats">
    <div class="forest-stat">🌳 <span>${projects.length}</span> Progetti</div>
    <div class="forest-stat">🌲 <span>${tasks.length}</span> Task</div>
    <div class="forest-stat">🌷 <span>${subtasks.length}</span> Subtask</div>
    ${glowCount ? `<div class="forest-stat" style="color:var(--ds)">✨ <span>${glowCount}</span> Leggendari</div>` : ''}
  </div>`;

  let sectionsHtml = statsHtml;

  if (projects.length) {
    sectionsHtml += `<div>
      <div class="forest-section-title">🌳 Grandi Alberi — Progetti</div>
      <div class="forest-grid">${projects.map(treeCard).join('')}</div>
    </div>`;
  }
  if (tasks.length) {
    sectionsHtml += `<div>
      <div class="forest-section-title">🌲 Alberi — Task Completati</div>
      <div class="forest-grid">${tasks.map(treeCard).join('')}</div>
    </div>`;
  }
  if (subtasks.length) {
    sectionsHtml += `<div>
      <div class="forest-section-title">🌷 Fiori & Funghi — Subtask</div>
      <div class="forest-grid">${subtasks.map(treeCard).join('')}</div>
    </div>`;
  }

  el.innerHTML = sectionsHtml;

  // Click tree → open detail
  el.querySelectorAll('[data-tree-id]').forEach(item => {
    item.addEventListener('click', () => {
      const t = findTask(item.dataset.treeId);
      if (!t) return;
      if (window.innerWidth < 768) openBottomSheet(t.id);
      else openDetail(t.id);
    });
  });
}

// === STATS ===
function renderStats(el) {
  const all = flatTasks();
  const now = new Date();
  const todayStr = toDateStr(now);

  // Completion counts
  const doneAll = all.filter(t => t.isComplete);
  const doneToday = doneAll.filter(t => t.completedAt && toDateStr(new Date(t.completedAt)) === todayStr).length;
  const weekAgo = new Date(now); weekAgo.setDate(weekAgo.getDate() - 7);
  const monthAgo = new Date(now); monthAgo.setDate(monthAgo.getDate() - 30);
  const doneWeek = doneAll.filter(t => t.completedAt && t.completedAt >= weekAgo.getTime()).length;
  const doneMonth = doneAll.filter(t => t.completedAt && t.completedAt >= monthAgo.getTime()).length;

  // Root vs subtask
  const rootDone = doneAll.filter(t => t.depth === 0).length;
  const subDone = doneAll.filter(t => t.depth > 0).length;

  // Most productive day of week
  const dayCounts = [0,0,0,0,0,0,0];
  doneAll.forEach(t => { if (t.completedAt) dayCounts[new Date(t.completedAt).getDay()]++; });
  const peakDay = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dayCounts.indexOf(Math.max(...dayCounts))];

  // Last 7 days bar chart data
  const days7 = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(now); d.setDate(d.getDate() - i);
    const ds = toDateStr(d);
    const completedCount = doneAll.filter(t => t.completedAt && toDateStr(new Date(t.completedAt)) === ds).length;
    const credDay = creditsData.history.filter(h => toDateStr(new Date(h.ts)) === ds).reduce((s, h) => s + h.amt, 0);
    days7.push({ lbl: ['S','M','T','W','T','F','S'][d.getDay()], completedCount, credDay });
  }
  const maxDone7 = Math.max(1, ...days7.map(d => d.completedCount));
  const maxCred7 = Math.max(1, ...days7.map(d => d.credDay));

  function barChart(vals, maxVal, color) {
    return vals.map(v => {
      const pct = Math.round((v.val / maxVal) * 100);
      return `<div class="cbc-col">
        <div class="cbc-bar-wrap"><div class="cbc-bar" style="height:${pct}%;background:${color}"></div></div>
        <div class="cbc-val">${v.val}</div>
        <div class="cbc-lbl">${v.lbl}</div>
      </div>`;
    }).join('');
  }

  // Credit transaction history
  const histRows = [...creditsData.history].reverse().slice(0, 60).map(h => `
    <div class="cr-hist-row">
      <span class="cr-hist-reason">${esc(h.reason)}</span>
      <span class="cr-hist-task">${esc(h.task || '')}</span>
      <span class="cr-hist-amt">+${h.amt} ⭐</span>
      <span class="cr-hist-time">${fmtRelTime(h.ts)}</span>
    </div>`).join('') || '<div style="padding:12px;font-size:13px;color:var(--t2);text-align:center">No credits earned yet</div>';

  el.innerHTML = `
    <div class="stat-section">
      <div class="stat-sh">Overview</div>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-num acc">${creditsData.balance}</div><div class="stat-lbl">⭐ Balance</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--ds)">${creditsData.lifetime}</div><div class="stat-lbl">Lifetime ⭐</div></div>
        <div class="stat-card"><div class="stat-num dn">${doneToday}</div><div class="stat-lbl">Done Today</div></div>
        <div class="stat-card"><div class="stat-num">${doneWeek}</div><div class="stat-lbl">Done This Week</div></div>
        <div class="stat-card"><div class="stat-num">${doneMonth}</div><div class="stat-lbl">Done This Month</div></div>
        <div class="stat-card"><div class="stat-num" style="color:#f97316">${creditsData.streak || 0} 🔥</div><div class="stat-lbl">Current Streak</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--ph)">${creditsData.longestStreak || 0}</div><div class="stat-lbl">Best Streak</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--acc-l)">${peakDay}</div><div class="stat-lbl">Most Productive Day</div></div>
        <div class="stat-card"><div class="stat-num dn">${rootDone}</div><div class="stat-lbl">Root Tasks Done</div></div>
        <div class="stat-card"><div class="stat-num">${subDone}</div><div class="stat-lbl">Subtasks Done</div></div>
      </div>
    </div>
    <div class="stat-section">
      <div class="stat-sh">Tasks Completed — Last 7 Days</div>
      <div class="css-bar-chart">${barChart(days7.map(d => ({val:d.completedCount,lbl:d.lbl})), maxDone7, 'var(--dn)')}</div>
    </div>
    <div class="stat-section">
      <div class="stat-sh">Credits Earned — Last 7 Days</div>
      <div class="css-bar-chart">${barChart(days7.map(d => ({val:d.credDay,lbl:d.lbl})), maxCred7, 'var(--ds)')}</div>
    </div>
    <div class="stat-section">
      <div class="stat-sh">Credit History</div>
      <div class="cr-hist">${histRows}</div>
    </div>
  `;
}

function fmtRelTime(ts) {
  const diff = (Date.now() - ts) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// === DETAIL PANEL ===
function openDetail(id) {

function closeDetail() {

      <div class="diff-meter" id="diff-meter">
        ${Array.from({length:9},(_,i)=>{const d=i+1;const active=(t.difficulty||5)>=d;return `<div class="diff-pip dp${d}${active?' active':''}" data-diff="${d}" style="opacity:${active?1:.25}"></div>`;}).join('')}

      <div class="ta" id="det-tags">

    </div>
    <div class="ds">
      <div class="dl">Reminder</div>
      <div class="tr-row">

      </div>

        ${!t.dueTime ? `<div class="wt">${ic('warn')}Set a due time to enable this reminder</div>` : ''}
        <select class="dsel" id="det-rmins">
          ${[5,10,15,30,60,1440].map(v => `<option value="${v}"${t.reminderMinutesBefore === v ? ' selected' : ''}>${v === 1440 ? '1 day before' : v + ' min before'}</option>`).join('')}

    recTog.addEventListener('click', () => {

  if (rinterval) rinterval.onchange = () => { state.editBuffer.recurringInterval = rinterval.value; };

  const detIsProject = document.getElementById('det-isproject');
  if (detIsProject) {
    detIsProject.addEventListener('click', () => {

      reDet();
    });

  body.querySelectorAll('[data-sub-check]').forEach(el => {

      reDet();
    });
  });
  body.querySelectorAll('[data-sub-del]').forEach(el => {
    el.addEventListener('click', () => {
      state.editBuffer.children = (state.editBuffer.children || []).filter(c => c.id !== el.dataset.subDel);

    });

function reDet() {
  const isMobile = window.innerWidth < 768;
  populateDetailPanel(isMobile ? 'bs-dpb' : 'dpb', isMobile ? 'bs-ti' : 'dp-ti');
}

function saveDetail() {
  const eb = state.editBuffer;
  if (!eb || !eb.id) return;
  const t = findTask(eb.id);
  if (!t) return;
  Object.assign(t, eb);
  propagateComplete(eb.id);
  save();
  closeDetail();
  renderAll();
  showToast('Task saved', 'success');
}

// === ANIMATIONS ===
function animateAdd(id) {
  requestAnimationFrame(() => {
    const el = document.querySelector(`.tc[data-id="${id}"]`);
    if (el) { el.classList.add('entering'); el.addEventListener('animationend', () => el.classList.remove('entering'), { once: true }); }
  });
}

function animateDelete(id, cb) {
  const el = document.querySelector(`.tc[data-id="${id}"]`);
  if (!el) { cb(); return; }
  el.classList.add('leaving');
  el.addEventListener('animationend', () => { el.remove(); cb(); }, { once: true });
}

// === CARD EVENTS ===
// ── Project hierarchy focus: enter/exit ──────────────────────────────────────
function enterProjectFocus(taskId) {
  const t = findTask(taskId);
  if (!t) return;
  state.focusBreadcrumb = [...(state.focusBreadcrumb || []), { id: t.id, title: t.title }];
  if (state.view !== 'all') switchView('all');
  else renderAll();
}

function bindCardEvents(container) {
  container.querySelectorAll('[data-check]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      if (!state.multiSelect) toggleComplete(el.dataset.check);
      renderAll();
    });

    // Long press on checkbox → split mechanic
    let lp = null;
    el.addEventListener('pointerdown', e => {
      lp = setTimeout(() => {
        lp = null;
        const t = findTask(el.dataset.check);
        if (t && !t.children?.length) {
          showModal('Split into subtasks?',
            `"${t.title}" will become a branch node with 2 editable subtasks.`,
            [{ label: 'Cancel', cls: 'sec' }, { label: 'Split', cls: 'pri', action: () => splitTask(t.id) }]
          );
        }
      }, 600);
    }, { passive: true });
    el.addEventListener('pointerup', () => { if (lp) { clearTimeout(lp); lp = null; } });
    el.addEventListener('contextmenu', e => {
      e.preventDefault();
      const t = findTask(el.dataset.check);
      if (t && !t.children?.length) {
        showModal('Split into subtasks?',
          `"${t.title}" will become a branch node with 2 editable subtasks.`,
          [{ label: 'Cancel', cls: 'sec' }, { label: 'Split', cls: 'pri', action: () => splitTask(t.id) }]
        );
      }
    });
  });

  container.querySelectorAll('[data-exp]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const id = el.dataset.exp;
      state.collapsed[id] = !state.collapsed[id];
      save(); renderTaskList();
    });
  });

  container.querySelectorAll('[data-add-sub]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const pid = el.dataset.addSub;
      const nm = prompt('Inserisci il nome della subtask:');
      if (!nm?.trim()) return;
      const child = addTask(nm.trim(), pid);
      state.collapsed[pid] = false;
      renderAll();
      animateAdd(child.id);
    });
  });

  container.querySelectorAll('[data-edit]').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); openDetail(el.dataset.edit); });
  });
  container.querySelectorAll('[data-del]').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); confirmDelete(el.dataset.del); });
  });

  // Card click → detail OR enter project hierarchy
  container.querySelectorAll('.tc').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('[data-check],[data-exp],[data-add-sub],[data-edit],[data-del],[data-drag-handle]')) return;
      if (state.multiSelect) {
        toggleSelect(el.dataset.id); return;
      }
      // If this is a project with children, enter hierarchy on title click
      const t = findTask(el.dataset.id);
      if (t && t.isProject && t.children?.length && e.target.closest('.tc-title')) {
        enterProjectFocus(el.dataset.id);
        return;
      }
      openDetail(el.dataset.id);
    });

    // Double-tap → collapse branch
    let lastTap = 0;
    el.addEventListener('touchstart', e => {
      const now = Date.now();
      if (now - lastTap < 300) {
        e.preventDefault();
        const t = findTask(el.dataset.id);
        if (t?.children?.length) {
          state.collapsed[t.id] = !state.collapsed[t.id];
          save(); renderTaskList();
        }
      }
      lastTap = now;
    }, { passive: false });

    // Long press → multi-select
    let lp2 = null;
    el.addEventListener('pointerdown', e => {
      if (e.target.closest('[data-check]')) return;
      lp2 = setTimeout(() => {
        lp2 = null;
        if (!state.multiSelect) { state.multiSelect = true; updateMSBar(); }
        toggleSelect(el.dataset.id);
      }, 500);
    }, { passive: true });
    el.addEventListener('pointerup', () => { if (lp2) { clearTimeout(lp2); lp2 = null; } });
    el.addEventListener('pointermove', () => { if (lp2) { clearTimeout(lp2); lp2 = null; } }, { passive: true });
  });

  // Drag and drop
  container.querySelectorAll('.tc').forEach(el => {
    el.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', el.dataset.id);
      el.classList.add('drag-src');
    });
    el.addEventListener('dragend', () => el.classList.remove('drag-src'));
    el.addEventListener('dragover', e => {
      e.preventDefault();
      el.classList.add('drag-ov');
    });
    el.addEventListener('dragleave', () => el.classList.remove('drag-ov'));
    el.addEventListener('drop', e => {
      e.preventDefault();
      el.classList.remove('drag-ov');
      const srcId = e.dataTransfer.getData('text/plain');
      const tgtId = el.dataset.id;
      if (srcId !== tgtId) reorderTask(srcId, tgtId);
    });
  });

  // Touch swipe
  initSwipe(container);
}

function reorderTask(srcId, tgtId) {
  const src = findTask(srcId); const tgt = findTask(tgtId);
  if (!src || !tgt) return;
  const { arr: srcArr } = findSiblings(srcId);
  const { arr: tgtArr } = findSiblings(tgtId);
  if (srcArr !== tgtArr) return;
  const si = srcArr.indexOf(src); const ti = srcArr.indexOf(tgt);
  if (si < 0 || ti < 0) return;
  srcArr.splice(si, 1); srcArr.splice(ti, 0, src);
  save(); renderTaskList();
}

function toggleSelect(id) {
  if (state.selectedIds.has(id)) state.selectedIds.delete(id);
  else state.selectedIds.add(id);
  renderTaskList();
  updateMSBar();
}

function updateMSBar() {
  const bar = document.getElementById('msbar');
  const cnt = document.getElementById('ms-cnt');
  if (!bar) return;
  if (state.multiSelect && state.selectedIds.size > 0) {
    bar.classList.add('vis');
    if (cnt) cnt.textContent = `${state.selectedIds.size} selected`;
  } else {
    // Strictly remove vis whenever count is 0 or multiSelect is off
    bar.classList.remove('vis');
    state.multiSelect = false;
  }
}

function clearMultiSelect() {
  state.multiSelect = false;
  state.selectedIds.clear();
  updateMSBar();
  renderAll();
}

// === KEYBOARD & TOUCH ===
function initSwipe(container) {
  container.querySelectorAll('.tc').forEach(tc => {
    const inner = tc.querySelector('.ti-inner');
    if (!inner) return;
    let startX = 0, startY = 0, curX = 0, swiping = false, swipeDir = 0;

    tc.addEventListener('touchstart', e => {
      if (e.touches.length !== 1) return;
      // If user is touching an action button (.sab), don't start swipe tracking
      if (e.target.closest('.sab')) return;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      curX = 0; swiping = false; swipeDir = 0;
      inner.style.transition = 'none';
    }, { passive: true });

    tc.addEventListener('touchmove', e => {
      if (e.touches.length !== 1) return;
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;
      if (!swiping && Math.abs(dy) > Math.abs(dx)) return;
      swiping = true;
      curX = dx;
      if (Math.abs(dx) > 8) {
        swipeDir = dx > 0 ? 1 : -1;
        const clamped = Math.max(-140, Math.min(100, dx));
        inner.style.transform = `translateX(${clamped}px)`;
      }
    }, { passive: true });

    tc.addEventListener('touchend', () => {
      inner.style.transition = '';
      if (swipeDir === 1 && curX > 60) {
        inner.style.transform = 'translateX(100%)';
        setTimeout(() => {
          const id = tc.dataset.id;
          toggleComplete(id);
          inner.style.transform = '';
          renderAll();
        }, 250);
      } else if (swipeDir === -1 && curX < -80) {
        inner.style.transform = 'translateX(-140px)';
        tc.querySelector('.sb-left').style.pointerEvents = 'all';
      } else {
        inner.style.transform = '';
        tc.querySelector('.sb-left').style.pointerEvents = 'none';
      }
    }, { passive: true });
  });
}

// Global keyboard
document.addEventListener('keydown', e => {
  const tag = document.activeElement?.tagName;
  const typing = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
  if (e.key === 'Escape') {
    if (document.getElementById('focus-overlay').classList.contains('open')) { closeFocusMode(); return; }
    if (state.multiSelect) { clearMultiSelect(); return; }
    if (document.getElementById('modal').classList.contains('open')) {
      document.getElementById('modal').classList.remove('open'); return;
    }
    closeDetail(); return;
  }
  if (typing) return;
  if (e.key === 'n' || e.key === 'N') { e.preventDefault(); document.getElementById('new-task-inp')?.focus(); }
  if (e.key === '/')  { e.preventDefault(); const w = document.getElementById('sw-wrap'); const i = document.getElementById('search-inp'); if (w) { w.classList.remove('col'); i?.focus(); } }
  if (e.key === 'f' || e.key === 'F') { e.preventDefault(); openFocusMode(state.detailTaskId || null); }
  if (e.key === 's' || e.key === 'S') { e.preventDefault(); switchView('shop'); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); document.getElementById('new-task-inp')?.focus(); }
});

// visualViewport push
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    const main = document.getElementById('main');
    if (!main) return;
    const diff = window.innerHeight - window.visualViewport.height;
    main.style.marginBottom = diff > 100 ? diff + 'px' : '';
  });
}

// === NOTIFICATIONS & REMINDERS ===
function checkReminders() {
  const now = Date.now();
  const tasks = flatTasks().filter(t => t.reminderEnabled && t.dueDate && t.dueTime && !t.isComplete);
  for (const t of tasks) {
    const due = new Date(t.dueDate + 'T' + t.dueTime).getTime();
    const remind = due - (t.reminderMinutesBefore || 10) * 60000;
    if (now >= remind && now < due && !notifiedIds.has(t.id)) {
      notifiedIds.add(t.id);
      saveNotified();
      fireReminder(t);
    }
  }
}

function fireReminder(t) {
  if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
    try {
      new Notification(`⏰ ${t.title}`, {
        body: `Due at ${t.dueTime} on ${t.dueDate}`,
        icon: ''
      });
    } catch(e) { showToast(`⏰ Reminder: ${t.title}`, 'warning'); }
  } else {
    showToast(`⏰ Reminder: ${t.title} due at ${t.dueTime}`, 'warning');
  }
}

// Syntax: "Task title !5 #tag1 #tag2" where !1-9 sets difficulty
function parseSmartInput(raw) {
  let title = raw.trim();
  let difficulty = 5;
  const tags = [];

  // Extract !N difficulty
  title = title.replace(/!([1-9])/g, (_, n) => { difficulty = parseInt(n); return ''; });
  // Extract #tags
  title = title.replace(/#(\S+)/g, (_, tag) => { tags.push(tag.replace(/[,;]+$/, '')); return ''; });
  title = title.replace(/\s{2,}/g, ' ').trim();

  return { title, difficulty, tags };
}

function handleAddTask() {
  const inp = document.getElementById('new-task-inp');
  const val = inp.value.trim();
  if (!val) { inp.focus(); return; }
  const parsed = parseSmartInput(val);
  if (!parsed.title) { inp.focus(); return; }
  const task = addTask(parsed.title);
  task.difficulty = parsed.difficulty;
  if (parsed.tags.length) task.tags = parsed.tags;
  save();
  inp.value = '';
  if (state.view !== 'all') switchView('all');
  renderAll();
  animateAdd(task.id);
}

// === ONBOARDING ===
function runOnboarding() {
  if (localStorage.getItem(ONBOARD_KEY)) return;
  const steps = [
    { sel: '.add-btn', text: 'Type a task above and click Add to plant your first task in the forest.', pos: 'bottom', title: 'Add a task' },
    { sel: '#sb-nav .ni:first-child', text: 'Switch between All Tasks, Today, Upcoming and more views here.', pos: 'right', title: 'Navigate views' },
    { sel: '#theme-btn', text: 'Toggle between dark and light mode anytime.', pos: 'top', title: 'Change theme' },
  ];
  let step = 0;
  let ott = null;
  function showStep(i) {
    // Fix 5: safe DOM removal — only call remove() if element is still in the document
    if (ott && ott.parentNode) ott.remove();
    // Fix 1: if we've passed the last step (or steps[i] is undefined), clean up and finish
    if (i >= steps.length || !steps[i]) {
      localStorage.setItem(ONBOARD_KEY, '1');
      return;
    }
    const s = steps[i];
    const target = document.querySelector(s.sel);
    if (!target || target.offsetWidth === 0) { showStep(i + 1); return; }
    const rect = target.getBoundingClientRect();
    ott = document.createElement('div');
    ott.className = `ott ${s.pos}`;
    ott.innerHTML = `<div class="ott-title">${s.title}</div><div>${s.text}</div>
      <div class="ott-actions">
        <button class="ott-skip">Skip tour</button>
        <button class="ott-next">${i < steps.length - 1 ? 'Next →' : 'Got it!'}</button>
      </div>`;
    document.body.appendChild(ott);
    const tw = ott.offsetWidth; const th = ott.offsetHeight;
    let top = 0, left = 0;
    if (s.pos === 'bottom') { top = rect.bottom + 10; left = rect.left; }
    else if (s.pos === 'top') { top = rect.top - th - 10; left = rect.left; }
    else if (s.pos === 'right') { top = rect.top; left = rect.right + 10; }
    top = Math.max(10, Math.min(top, window.innerHeight - th - 10));
    left = Math.max(10, Math.min(left, window.innerWidth - tw - 10));
    ott.style.cssText += `position:fixed;top:${top}px;left:${left}px;z-index:900`;
    // Fix 2: use onclick assignments so re-entering showStep never stacks duplicate listeners
    ott.querySelector('.ott-next').onclick = () => showStep(i + 1);
    ott.querySelector('.ott-skip').onclick = () => {
      if (ott && ott.parentNode) ott.remove();
      localStorage.setItem(ONBOARD_KEY, '1');
    };
  }
  setTimeout(() => showStep(0), 1200);
}

// === QR SCANNER ===
let qrScannerInstance = null;
let qrLib = null;

function loadQrLib() {
  return new Promise((resolve, reject) => {
    if (qrLib) { resolve(qrLib); return; }
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js';
    script.async = true;
    script.onload  = () => { qrLib = window.Html5Qrcode; resolve(qrLib); };
    script.onerror = () => reject(new Error('QR lib load failed'));
    document.head.appendChild(script);
  });
}

function stopQrScanner() {
  if (qrScannerInstance) {
    qrScannerInstance.stop().catch(()=>{}).finally(() => {
      qrScannerInstance.clear();
      qrScannerInstance = null;
    });
  }
  document.getElementById('qr-scan-modal')?.classList.remove('open');
}

function openQrScanner(onSuccess) {
  const modal   = document.getElementById('qr-scan-modal');
  const status  = document.getElementById('qr-scan-status');
  const container = document.getElementById('qr-reader-container');
  container.innerHTML = '';
  modal.classList.add('open');
  status.textContent = 'Caricamento libreria…';

  loadQrLib().then(Lib => {
    status.textContent = 'Avvio fotocamera…';
    const scanner = new Lib('qr-reader-container', { verbose: false });
    qrScannerInstance = scanner;

    scanner.start(
      { facingMode: 'environment' },
      { fps: 12, qrbox: { width: 250, height: 250 } },
      (decodedText) => {
        status.textContent = '✅ Codice rilevato!';
        stopQrScanner();
        const result = parseImportString(decodedText);
        if (!result) {
          showToast('❌ Codice non valido', 'error');
          return;
        }
        onSuccess(decodedText);
        showToast('📷 QR scansionato con successo!', 'success');
      },
      () => { /* scan miss — ignore */ }
    ).then(() => {
      status.textContent = 'Punta la fotocamera al QR code';
    }).catch(err => {
      status.textContent = '⚠️ Impossibile accedere alla fotocamera';
      console.warn('QR camera error:', err);
    });
  }).catch(() => {
    status.textContent = '❌ Errore caricamento libreria QR';
  });

  document.getElementById('qr-scan-close').onclick = stopQrScanner;
}

function awardCredits(amt, reason, taskTitle, anchorEl) {
  if (amt <= 0) return;
  creditsData.balance = (creditsData.balance || 0) + amt;
  creditsData.lifetime = (creditsData.lifetime || 0) + amt;
  creditsData.history = creditsData.history || [];
  creditsData.history.push({ amt, reason, task: taskTitle || '', ts: Date.now() });
  if (creditsData.history.length > 500) creditsData.history = creditsData.history.slice(-500);
  saveCredits();
  // Animate count-up in sidebar
  animateCreditCount(creditsData.balance);
  // Floating "+N ⭐" from task card
  if (anchorEl) spawnCreditFloat(`+${amt} ⭐`, anchorEl);
}

function animateCreditCount(target) {
  const el = document.getElementById('credit-balance');
  if (!el) return;
  const start = parseInt(el.textContent) || 0;
  const dur = 600; const t0 = Date.now();
  function step() {
    const prog = Math.min(1, (Date.now() - t0) / dur);
    const ease = 1 - Math.pow(1 - prog, 3);
    el.textContent = Math.round(start + (target - start) * ease) + ' ⭐';
    if (prog < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function spawnCreditFloat(text, anchorEl) {
  const rect = anchorEl.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'credit-float';
  el.textContent = text;
  // Clamp to viewport
  const left = Math.max(30, Math.min(window.innerWidth - 80, rect.left + rect.width / 2));
  const top = Math.max(20, rect.top - 10);
  el.style.cssText = `left:${left}px;top:${top}px`;
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove(), { once: true });
}

function awardTaskCredits(t) {
  // Find anchor element for float animation
  const anchorEl = document.querySelector(`.tc[data-id="${t.id}"] .ca`) || document.querySelector(`.tc[data-id="${t.id}"]`);

  // Base amount by depth
  let base = 0;
  if (t.depth === 0 && !t.children?.length) base = 10;
  else if (t.depth === 0) base = 5; // branch bonus handled separately
  else if (t.depth === 1) base = 4;
  else if (t.depth === 2) base = 2;
  else base = 1;

  if (base > 0) awardCredits(base, 'Task completed', t.title, anchorEl);

  // Early completion bonus
  if (t.dueDate && t.dueTime) {
    const due = new Date(t.dueDate + 'T' + t.dueTime).getTime();
    if (Date.now() < due) {
      setTimeout(() => awardCredits(2, 'Early completion', t.title, anchorEl), 400);
      setTimeout(() => showBonusToast('⚡ Early! +2 ⭐'), 600);
    }
  } else if (t.dueDate) {
    const today = toDateStr(new Date());
    if (t.dueDate >= today) {
      setTimeout(() => awardCredits(2, 'Early completion', t.title, anchorEl), 400);
      setTimeout(() => showBonusToast('⚡ Early! +2 ⭐'), 600);
    }
  }

  // Branch bonus: if depth-0 with all children done
  if (t.depth === 0 && t.children?.length && t.children.every(c => c.isComplete)) {
    setTimeout(() => awardCredits(5, 'Branch completed', t.title, anchorEl), 300);
    setTimeout(() => showBonusToast('🌳 Branch done! +5 ⭐'), 500);
  }

  // Daily completion bonus
  setTimeout(() => checkDailyCompletion(anchorEl), 700);

  // Streak bonus
  const streak = creditsData.streak || 0;
  if (streak > 1) {
    setTimeout(() => {
      awardCredits(streak, 'Streak bonus', `${streak}-day streak`, anchorEl);
      showBonusToast(`🔥 Streak Bonus! +${streak} ⭐`);
    }, 900);
  }
}

function checkDailyCompletion(anchorEl) {
  const todayStr = toDateStr(new Date());
  const todayTasks = flatTasks().filter(t => t.dueDate === todayStr);
  if (todayTasks.length > 0 && todayTasks.every(t => t.isComplete)) {
    const bonusKey = DAILY_BONUS_KEY + '_' + todayStr;
    if (!localStorage.getItem(bonusKey)) {
      localStorage.setItem(bonusKey, '1');
      awardCredits(15, 'All daily tasks done!', '', anchorEl);
      showBonusToast('🎉 All tasks done today! +15 ⭐');
      launchConfetti();
    }
  }
}

function updateStreakOnOpen() {
  const today = toDateStr(new Date());
  const last = creditsData.lastDate;
  if (!last) { creditsData.lastDate = today; saveCredits(); return; }
  if (last === today) return;
  const dayDiff = Math.round((new Date(today) - new Date(last)) / 86400000);
  if (dayDiff === 1) {
    creditsData.streak = (creditsData.streak || 0) + 1;
    creditsData.longestStreak = Math.max(creditsData.longestStreak || 0, creditsData.streak);
  } else if (dayDiff > 1) {
    creditsData.streak = 0;
  }
  creditsData.lastDate = today;
  saveCredits();
}

function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  if (!canvas) return;
  canvas.style.display = 'block';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const particles = Array.from({length: 160}, () => ({
    x: Math.random() * canvas.width, y: -10,
    vx: (Math.random() - 0.5) * 6, vy: Math.random() * 4 + 2,
    color: ['#7c6aff','#a89bff','#52b788','#ffd166','#f4a261','#e63946','#06d6a0'][Math.floor(Math.random()*7)],
    size: Math.random() * 8 + 4, rot: Math.random() * 360, spin: (Math.random()-0.5)*8
  }));
  let alive = true;
  function frame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.rot += p.spin;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI/180);
      ctx.fillStyle = p.color; ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6); ctx.restore();
    });
    if (alive && particles.some(p => p.y < canvas.height + 20)) requestAnimationFrame(frame);
    else { canvas.style.display = 'none'; alive = false; }
  }
  requestAnimationFrame(frame);
  setTimeout(() => { alive = false; canvas.style.display = 'none'; }, 5000);
}

function openFocusMode(taskId) {
  const overlay = document.getElementById('focus-overlay');
  overlay.classList.add('open');
  if (taskId) pomoState.taskId = taskId;
  renderFocusMode();
}

function closeFocusMode() {
  clearInterval(pomoState.timer);
  pomoState.running = false;
  document.getElementById('focus-overlay').classList.remove('open');
}

function renderFocusMode() {
  const overlay = document.getElementById('focus-overlay');
  const t = pomoState.taskId ? findTask(pomoState.taskId) : null;

  // Deadline countdown
  let deadlineTxt = '';
  if (t && t.dueDate && t.dueTime) {
    const due = new Date(t.dueDate + 'T' + t.dueTime);
    const diff = Math.max(0, due - Date.now());
    const hh = Math.floor(diff / 3600000);
    const mm = Math.floor((diff % 3600000) / 60000);
    deadlineTxt = `<div class="fo-deadline">⏰ ${hh}h ${mm}m until deadline (${t.dueTime})</div>`;
  }

  // Subtask list
  const subs = t?.children?.length ? `<div class="fo-subs">${t.children.map(c => `
    <div class="fo-sub" data-fo-sub="${c.id}">
      <div class="fo-cb${c.isComplete ? ' ck' : ''}"><svg style="width:11px;height:11px;color:#fff;${c.isComplete ? '' : 'display:none'}"><use href="#ic-check"/></svg></div>
      <span style="${c.isComplete ? 'text-decoration:line-through;color:var(--t2)' : ''}">${esc(c.title)}</span>
    </div>`).join('')}</div>` : '';

  // Pomodoro ring
  const total = pomoState.phase === 'work' ? POMO_WORK : POMO_BREAK;
  const R = 66; const circ = 2 * Math.PI * R;
  const offset = circ * (1 - pomoState.remaining / total);
  const strokeColor = pomoState.phase === 'work' ? 'var(--acc)' : 'var(--dn)';
  const mins = String(Math.floor(pomoState.remaining / 60)).padStart(2, '0');
  const secs = String(pomoState.remaining % 60).padStart(2, '0');
  const phaseLabel = pomoState.phase === 'work' ? '🎯 Focus' : '☕ Break';

  // Task selector
  const topTasks = flatTasks().filter(t => !t.isComplete).slice(0, 12);
  const taskOpts = `<select id="fo-task-sel" class="dsel" style="width:100%;margin-bottom:4px">
    <option value="">— No task linked —</option>
    ${topTasks.map(t => `<option value="${t.id}"${t.id === pomoState.taskId ? ' selected' : ''}>${esc(t.title)}</option>`).join('')}
  </select>`;

  overlay.innerHTML = `<div class="fo-inner">
    <button class="fo-close" id="fo-close">✕ Close Focus</button>
    ${t ? `<div class="fo-task">
      <div class="fo-title">${esc(t.title)}</div>
      ${t.notes ? `<div class="fo-notes">${esc(t.notes)}</div>` : ''}
      ${deadlineTxt}
      ${subs}
    </div>` : `<div class="fo-task" style="color:var(--t2);font-size:13.5px">Select a task below to focus on it.</div>`}
    <div class="fo-pomo">
      <div class="fo-mode-lbl">${phaseLabel}</div>
      <div class="fo-ring-wrap">
        <svg class="fo-ring" viewBox="0 0 160 160">
          <circle class="fo-ring-track" cx="80" cy="80" r="${R}"/>
          <circle class="fo-ring-fill" cx="80" cy="80" r="${R}"
            stroke="${strokeColor}"
            stroke-dasharray="${circ.toFixed(2)}"
            stroke-dashoffset="${offset.toFixed(2)}"
            transform="rotate(-90 80 80)"/>
        </svg>
        <div class="fo-time">${mins}:${secs}</div>
      </div>
      <div class="fo-pomo-btns">
        <button class="fo-btn${pomoState.running ? ' sec' : ''}" id="fo-playpause">${pomoState.running ? '⏸ Pause' : '▶ Start'}</button>
        <button class="fo-btn sec" id="fo-reset">↺ Reset</button>
      </div>
      <div class="fo-sessions">Sessions completed: ${pomoState.sessions}</div>
      <div class="fo-credits-hint">Complete a session to earn +3 ⭐</div>
      ${taskOpts}
    </div>
  </div>`;

  // Bind events
  document.getElementById('fo-close').onclick = closeFocusMode;
  document.getElementById('fo-playpause').onclick = togglePomoTimer;
  document.getElementById('fo-reset').onclick = resetPomoTimer;
  const foSel = document.getElementById('fo-task-sel');
  if (foSel) foSel.onchange = () => { pomoState.taskId = foSel.value || null; renderFocusMode(); };

  overlay.querySelectorAll('[data-fo-sub]').forEach(el => {
    el.onclick = () => {
      if (!pomoState.taskId) return;
      const parent = findTask(pomoState.taskId);
      const sub = parent?.children?.find(c => c.id === el.dataset.foSub);
      if (sub) {
        sub.isComplete = !sub.isComplete;
        sub.completedAt = sub.isComplete ? Date.now() : null;
        if (sub.isComplete) awardTaskCredits(sub);
        propagateComplete(pomoState.taskId);
        save();
        renderFocusMode();
      }
    };
  });
}

function togglePomoTimer() {
  if (pomoState.running) {
    clearInterval(pomoState.timer);
    pomoState.running = false;
  } else {
    pomoState.running = true;
    pomoState.timer = setInterval(() => {
      pomoState.remaining--;
      if (pomoState.remaining <= 0) {
        clearInterval(pomoState.timer);
        pomoState.running = false;
        const wasWork = pomoState.phase === 'work';
        if (wasWork) {
          pomoState.sessions++;
          // Award Pomodoro credits
          const anchorEl = document.querySelector('.fo-ring-wrap');
          awardCredits(3, 'Pomodoro session', pomoState.taskId ? (findTask(pomoState.taskId)?.title || '') : '', anchorEl);
          showBonusToast('🍅 Pomodoro done! +3 ⭐');
          pomoState.phase = 'break';
          pomoState.remaining = POMO_BREAK;
        } else {
          pomoState.phase = 'work';
          pomoState.remaining = POMO_WORK;
        }
      }
      renderFocusMode();
    }, 1000);
  }
  renderFocusMode();
}

function resetPomoTimer() {
  clearInterval(pomoState.timer);
  pomoState.running = false;
  pomoState.remaining = pomoState.phase === 'work' ? POMO_WORK : POMO_BREAK;
  renderFocusMode();
}

// === PROJECTS KANBAN ===
function getProjects() {
  return flatTasks().filter(t => t.isProject && t.children?.length);
}

function renderProjects(el) {
  const projects = getProjects();

  if (!projects.length) {
    el.innerHTML = `<div class="proj-empty">
      <svg style="width:64px;height:64px;opacity:.3"><use href="#ic-kanban"/></svg>
      <h3>No projects yet</h3>
      <p>Open any task that has subtasks and toggle "Make Project" in the detail panel.</p>
    </div>`;
    return;
  }

  // Validate state.activeProjectId
  if (!state.activeProjectId || !projects.find(p => p.id === state.activeProjectId)) {
    state.activeProjectId = projects[0].id;
    save();
  }

  const activeProject = findTask(state.activeProjectId);

  // ---- TABS ----
  const tabsHtml = projects.map(p => `
    <div class="proj-tab${p.id === state.activeProjectId ? ' act' : ''}" data-proj-tab="${p.id}">
      <span class="pt-dot"></span>
      <span>${esc(p.title)}</span>
    </div>
  `).join('') + `<div class="proj-add-tab" id="proj-add-tab" title="New project">＋</div>`;

  // ---- KANBAN COLUMNS ----
  const columns = [
    { id: 'todo', label: 'Not Done',         cls: 'kb-todo', icon: '○' },
    { id: 'wip',  label: 'Work in Progress', cls: 'kb-wip',  icon: '◑' },
    { id: 'done', label: 'Done',             cls: 'kb-done', icon: '●' },
  ];

  const cards = (activeProject?.children || []);

  const colsHtml = columns.map(col => {
    const colCards = cards.filter(c => {
      if (col.id === 'done') return c.isComplete || c.boardStatus === 'done';
      if (col.id === 'wip')  return !c.isComplete && c.boardStatus === 'wip';
      return !c.isComplete && (c.boardStatus === 'todo' || !c.boardStatus);
    });

    const cardsHtml = colCards.length
      ? colCards.map(c => renderKanbanCard(c)).join('')
      : `<div class="kb-empty">Drop tasks here</div>`;

    return `<div class="kb-col ${col.cls}" data-kb-col="${col.id}">
      <div class="kb-col-hd">
        <span>${col.icon} ${col.label}</span>
        <span class="kb-cnt">${colCards.length}</span>
      </div>
      <div class="kb-cards" data-kb-drop="${col.id}">${cardsHtml}</div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="proj-tabs" id="proj-tabs">${tabsHtml}</div>
    <div class="kanban-board" id="kanban-board">${colsHtml}</div>
  `;

  // Bind tab clicks
  el.querySelectorAll('[data-proj-tab]').forEach(tab => {
    tab.addEventListener('click', () => {
      state.activeProjectId = tab.dataset.projTab;
      save();
      renderProjects(el);
    });
  });

  // "+" tab → new task then make it a project
  document.getElementById('proj-add-tab')?.addEventListener('click', () => {
    const title = prompt('Titolo del nuovo progetto:');
    if (!title?.trim()) return;
    const t = addTask(title.trim());
    t.isProject = true;
    save();
    state.activeProjectId = t.id;
    save();
    renderAll();
  });

  // Bind kanban card clicks → open detail panel
  el.querySelectorAll('[data-kcard]').forEach(card => {
    card.addEventListener('click', () => {
      openDetail(card.dataset.kcard);
    });
  });

  // Drag-and-drop
  initKanbanDnd(el, activeProject);
}

function renderKanbanCard(c) {
  const prioMap = { low: 'Low', medium: 'Med', high: 'High' };
  const isDone = c.isComplete || c.boardStatus === 'done';
  const subCount = c.children?.length || 0;
  const isProj = c.isProject;
  return `<div class="kb-card" draggable="true" data-kcard="${c.id}">
    <div class="kb-card-title${isDone ? ' done-title' : ''}">${esc(c.title)}</div>
    <div class="kb-card-meta">
      <span class="kb-pp ${c.priority}">${prioMap[c.priority] || 'Med'}</span>
      ${subCount ? `<span class="kb-sub-badge">${subCount} sub</span>` : ''}
      ${isProj ? `<span class="kb-proj-badge">⬛ Project</span>` : ''}
      ${c.dueDate ? `<span style="font-size:10px;color:var(--t2)">${c.dueDate}</span>` : ''}
    </div>
  </div>`;
}

function initKanbanDnd(container, project) {
  if (!project) return;
  let dragCardId = null;

  // Drag from cards
  container.querySelectorAll('[data-kcard]').forEach(card => {
    card.addEventListener('dragstart', e => {
      dragCardId = card.dataset.kcard;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      dragCardId = null;
    });
  });

  // Drop zones
  container.querySelectorAll('[data-kb-drop]').forEach(zone => {
    const colEl = zone.closest('.kb-col');

    zone.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      colEl?.classList.add('drag-over');
    });
    zone.addEventListener('dragleave', e => {
      if (!zone.contains(e.relatedTarget)) colEl?.classList.remove('drag-over');
    });
    zone.addEventListener('drop', e => {
      e.preventDefault();
      colEl?.classList.remove('drag-over');
      if (!dragCardId) return;

      const newStatus = zone.dataset.kbDrop; // 'todo' | 'wip' | 'done'
      const child = findTask(dragCardId);
      if (!child) return;

      // Update boardStatus
      child.boardStatus = newStatus;

      // Sync isComplete with 'done' column
      if (newStatus === 'done') {
        child.isComplete = true;
        child.completedAt = child.completedAt || Date.now();
        awardTaskCredits(child);
      } else if (newStatus === 'todo' || newStatus === 'wip') {
        child.isComplete = false;
        child.completedAt = null;
      }

      // Auto-project rule: WIP + has own subtasks → make it a project
      if (newStatus === 'wip' && child.children?.length > 0 && !child.isProject) {
        child.isProject = true;
        showToast(`⬛ "${child.title}" became a Project!`, 'info');
      }

      propagateComplete(project.id);
      save();
      // Update state.activeProjectId so the board stays on the same tab
      state.activeProjectId = project.id;
      // Re-render just the projects view
      const vp = document.getElementById('v-projects');
      if (vp) renderProjects(vp);
    });
  });
}

function applyEquippedTheme(themeId, animate = true) {
  const html = document.documentElement;
  if (animate) {
    html.style.transition = 'background .45s ease,color .45s ease';
  }
  // Remove all theme attrs
  html.removeAttribute('data-apptheme');
  if (themeId && themeId !== 'midnight') {
    html.setAttribute('data-apptheme', themeId);
    // aurora needs light data-theme override for text contrast
    if (themeId === 'aurora' || themeId === 'solarized' || themeId === 'cyberpunk') {
      html.dataset.theme = 'dark';
    }
    if (themeId === 'sakura') {
      html.dataset.theme = 'light';
    }
  }
}

function spendCredits(amt) {
  creditsData.balance = Math.max(0, (creditsData.balance || 0) - amt);
  saveCredits();
  animateCreditCount(creditsData.balance);
  // Coin spend animation
  const el = document.createElement('div');
  el.className = 'coin-spend';
  el.textContent = `-${amt} ⭐`;
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove(), { once: true });
}

function purchaseItem(type, id) {
  const catalog = type === 'skin' ? SKIN_CATALOG : THEME_CATALOG;
  const item = catalog.find(i => i.id === id);
  if (!item) return;
  if (creditsData.balance < item.price) {
    showToast(`Not enough ⭐ — need ${item.price}`, 'error'); return;
  }
  spendCredits(item.price);
  if (type === 'skin') {
    if (!shopData.ownedSkins.includes(id)) shopData.ownedSkins.push(id);
  } else {
    if (!shopData.ownedThemes.includes(id)) shopData.ownedThemes.push(id);
  }
  saveShop();
  showToast(`${item.label} unlocked! 🎉`, 'success');
  renderShop(document.getElementById('v-shop'));
}

function equipItem(type, id) {
  if (type === 'skin') {
    shopData.equippedSkin = id;
  } else {
    shopData.equippedTheme = id;
    applyEquippedTheme(id, true);
    // Theme-skin synergy: unlock paired skin for free and auto-equip if on default
    const paired = THEME_SKIN_PAIRS[id];
    if (paired) {
      if (!shopData.ownedSkins.includes(paired)) {
        shopData.ownedSkins.push(paired);
        showToast(`🎁 Skin "${SKIN_CATALOG.find(s=>s.id===paired)?.label||paired}" sbloccata col tema!`, 'success');
      }
      if (shopData.equippedSkin === 'default' || shopData.equippedSkin === '') {
        shopData.equippedSkin = paired;
        showToast(`✨ Skin "${SKIN_CATALOG.find(s=>s.id===paired)?.label||paired}" applicata automaticamente!`, 'info');
      }
    }
  }
  saveShop();
  renderAll();
  renderShop(document.getElementById('v-shop'));
}

// ── Skin-char codec: each skin maps to a single lowercase letter ──────────────
const SKIN_CHAR_MAP = {
  neon:'n', paper:'p', galaxy:'g', fire:'f', forest:'r', retro:'x',
  void:'v', 'sakura-card':'s', chrome:'c', aether:'a', volcano:'o'
};
const CHAR_SKIN_MAP = Object.fromEntries(Object.entries(SKIN_CHAR_MAP).map(([k,v])=>[v,k]));

// Theme codec
const THEME_CHAR_MAP = { midnight:'m', sakura:'s', solarized:'z', cyberpunk:'y', aurora:'u' };
const CHAR_THEME_MAP = Object.fromEntries(Object.entries(THEME_CHAR_MAP).map(([k,v])=>[v,k]));

// Priority codec
const PRIO_NUM  = { low:1, medium:2, high:3 };
const NUM_PRIO  = { 1:'low', 2:'medium', 3:'high' };

// ── compressTask: recursively minify a task tree node ────────────────────────
function compressTask(t) {
  const out = {};
  out.i = t.id;
  out.t = t.title;
  out.p = PRIO_NUM[t.priority] || 2;
  out.d = t.dueDate || '!';
  if (t.dueTime) out.T = t.dueTime;
  if (t.isComplete) out.c = 1;
  if (t.isProject) out.j = 1;
  if (t.notes) out.n = t.notes;
  if (t.tags?.length) out.g = t.tags;
  if (t.skin) out.k = t.skin;
  if (t.difficulty && t.difficulty !== 5) out.df = t.difficulty;
  if (t.reminderEnabled) { out.re = 1; out.rm = t.reminderMinutesBefore; }
  if (t.isRecurring) { out.rc = 1; out.ri = t.recurringInterval; }
  if (t.children?.length) out.h = t.children.map(compressTask);
  return out;
}

// ── hydrateTask: expand a compressed node back to full task shape ─────────────
function hydrateTask(c, parentId = null, depth = 0) {
  const t = {
    id: c.i,
    parentId,
    title: c.t || '',
    notes: c.n || '',
    dueDate: (c.d && c.d !== '!') ? c.d : null,
    dueTime: c.T || null,
    reminderEnabled: !!c.re,
    reminderMinutesBefore: c.rm ?? 10,
    priority: NUM_PRIO[c.p] || 'medium',
    difficulty: c.df || 5,
    tags: c.g || [],
    createdAt: c.ca || Date.now(),
    completedAt: c.ca2 || null,
    isComplete: !!c.c,
    children: [],
    skin: c.k || null,
    isRecurring: !!c.rc,
    recurringInterval: c.ri || 'daily',
    depth,
    isProject: !!c.j,
    boardStatus: c.bs || 'todo'
  };
  if (c.h?.length) t.children = c.h.map(ch => hydrateTask(ch, t.id, depth + 1));
  return t;
}

// ── compressState: serialize entire app state to compact array ────────────────
// Output: [version, coins, streak, skinStr, themeStr, equippedSkin,
//          equippedTheme, appThemeSetting, darkLight, tasks[]]
function compressState() {
  const skins = shopData.ownedSkins
    .filter(s => s !== 'default')
    .map(s => SKIN_CHAR_MAP[s] || '')
    .filter(Boolean)
    .join('');
  const themes = shopData.ownedThemes
    .filter(s => s !== 'midnight')
    .map(s => THEME_CHAR_MAP[s] || '')
    .filter(Boolean)
    .join('');
  return [
    3,                                          // [0] format version
    creditsData.balance || 0,                   // [1] coin balance
    creditsData.streak  || 0,                   // [2] streak
    skins,                                      // [3] owned skins (chars)
    themes,                                     // [4] owned themes (chars)
    SKIN_CHAR_MAP[shopData.equippedSkin]  || '', // [5] equipped skin char
    THEME_CHAR_MAP[shopData.equippedTheme]|| 'm',// [6] equipped theme char
    document.documentElement.getAttribute('data-apptheme') || '',// [7] apptheme
    document.documentElement.dataset.theme || 'dark', // [8] dark/light
    state.tasks.map(compressTask)               // [9] tasks
  ];
}

// ── hydrateState: reconstruct app state from compact array ───────────────────
function hydrateState(arr) {
  // arr[0] = version 3 (compact format)
  const [,coins, streak, skinStr, themeStr, eqSkinChar, eqThemeChar,
         appThemeStr, darkLight, tasks] = arr;

  // Reconstruct owned skins (always include 'default')
  const ownedSkins = ['default',
    ...skinStr.split('').map(c => CHAR_SKIN_MAP[c]).filter(Boolean)
  ];
  const ownedThemes = ['midnight',
    ...themeStr.split('').map(c => CHAR_THEME_MAP[c]).filter(Boolean)
  ];

  // Unlock any theme-paired skins
  Object.entries(THEME_SKIN_PAIRS).forEach(([th, sk]) => {
    if (ownedThemes.includes(th) && !ownedSkins.includes(sk)) ownedSkins.push(sk);
  });

  return {
    tasks: (tasks || []).map(c => hydrateTask(c)),
    credits: {
      balance: coins || 0, lifetime: coins || 0,
      history: [], streak: streak || 0,
      longestStreak: streak || 0, lastDate: null
    },
    shop: {
      ownedSkins,
      ownedThemes,
      equippedSkin: CHAR_SKIN_MAP[eqSkinChar] || 'default',
      equippedTheme: CHAR_THEME_MAP[eqThemeChar] || 'midnight',
      defaultSkin: 'default'
    },
    settings: {
      theme: darkLight || 'dark',
      appTheme: appThemeStr || 'midnight'
    }
  };
}
