<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Arborist</title>
<!-- PWA Meta -->
<meta name="theme-color" id="pwa-theme-color" content="#0c0d12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Arborist">
<meta name="description" content="Arborist – il tuo task manager ad albero">
<link id="pwa-manifest" rel="manifest" href="data:application/json,%7B%22name%22%3A%22Arborist%22%2C%22short_name%22%3A%22Arborist%22%2C%22display%22%3A%22standalone%22%2C%22theme_color%22%3A%220c0d12%22%2C%22background_color%22%3A%220c0d12%22%2C%22start_url%22%3A%22.%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%2520xmlns%3D%2527http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%2527%2520viewBox%3D%270%25200%252064%252064%2527%253E%253Ccircle%2520cx%3D%252732%2527%2520cy%3D%252732%2527%2520r%3D%252732%2527%2520fill%3D%2527%25237c6aff%2527%2F%253E%253Ctext%2520x%3D%252750%2525%2527%2520y%3D%252756%2525%2527%2520font-size%3D%252732%2527%2520text-anchor%3D%2527middle%2527%2520fill%3D%2527%2523fff%2527%253E%25F0%259F%258C%25B3%253C%2Ftext%253E%253C%2Fsvg%253E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
<style>
/* ====== CSS CUSTOM PROPERTIES ====== */
:root {
  --acc: #7c6aff; --acc-l: #a89bff; --acc-d: rgba(124,106,255,.18); --acc-d2: rgba(124,106,255,.08);
  --bg0: #0c0d12; --bg1: #12141c; --bg2: #1a1c26; --bgc: #181a24; --bgh: #1e2130;
  --t0: #ecedf5; --t1: #9296b0; --t2: #60637a; --ti: #0c0d12;
  --b: rgba(255,255,255,.06); --b2: rgba(255,255,255,.11);
  --pl: #52b788; --pm: #f4a261; --ph: #e63946;
  --ov: #e63946; --dt: #f4a261; --ds: #ffd166; --dn: #52b788;
  --sw: 258px; --dw: 370px; --r: 12px; --rs: 8px; --rx: 5px;
  --sh: 0 2px 16px rgba(0,0,0,.45); --shl: 0 8px 48px rgba(0,0,0,.55);
  --tr: .2s cubic-bezier(.4,0,.2,1); --ts: .35s cubic-bezier(.34,1.56,.64,1);
  --st: env(safe-area-inset-top,0px); --sb: env(safe-area-inset-bottom,0px);
  --sl: env(safe-area-inset-left,0px); --sr: env(safe-area-inset-right,0px);
  --navh: 0px;
}
[data-theme=light] {
  --bg0:#f0f0f5; --bg1:#fafafa; --bg2:#ffffff; --bgc:#ffffff; --bgh:#f3f3f8;
  --t0:#14151f; --t1:#5a5c70; --t2:#9092a8; --ti:#ffffff;
  --b:rgba(0,0,0,.07); --b2:rgba(0,0,0,.13);
  --sh:0 2px 16px rgba(0,0,0,.08); --shl:0 8px 48px rgba(0,0,0,.13);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg0);color:var(--t0);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:15px;line-height:1.5;-webkit-text-size-adjust:100%}
input,textarea,button,select{font:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
ul,ol{list-style:none}
textarea{resize:none}
svg{display:block;flex-shrink:0}

/* ====== APP SHELL ====== */
#app{display:flex;height:100vh;height:100dvh;overflow:hidden;padding-top:var(--st)}

/* ====== SIDEBAR ====== */
#sidebar{
  width:var(--sw);min-width:var(--sw);background:var(--bg1);border-right:1px solid var(--b);
  display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;
  padding-left:var(--sl);z-index:100;flex-shrink:0;
}
.sb-hd{padding:20px 16px 12px;border-bottom:1px solid var(--b)}
.app-name{
  font-size:clamp(20px,3vw,24px);font-weight:800;letter-spacing:-.4px;
  font-family:Georgia,'Times New Roman',serif;
  background:linear-gradient(135deg,var(--acc-l),var(--acc));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.app-tag{font-size:11px;color:var(--t2);margin-top:1px}
.sb-nav{flex:1;padding:8px 6px;display:flex;flex-direction:column;gap:1px}
.nav-sec{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t2);padding:10px 10px 3px}
.ni{
  display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--rs);
  cursor:pointer;color:var(--t1);font-size:13.5px;font-weight:500;
  transition:background var(--tr),color var(--tr);min-height:44px;user-select:none;
}
.ni:hover{background:var(--bgh);color:var(--t0)}
.ni.act{background:var(--acc-d);color:var(--acc-l)}
.ni svg{width:17px;height:17px;flex-shrink:0}
.ni .cnt{margin-left:auto;background:var(--bg2);color:var(--t1);font-size:11px;font-weight:700;padding:1px 7px;border-radius:10px;min-width:22px;text-align:center}
.ni.act .cnt{background:var(--acc-d);color:var(--acc-l)}
.sb-ft{padding:10px 6px calc(10px + var(--sb));border-top:1px solid var(--b)}
.theme-btn{
  display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--rs);
  cursor:pointer;color:var(--t1);font-size:13.5px;font-weight:500;width:100%;min-height:44px;
  transition:background var(--tr),color var(--tr);
}
.theme-btn:hover{background:var(--bgh);color:var(--t0)}
.theme-btn svg{width:17px;height:17px}

/* ====== MAIN ====== */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.mh{background:var(--bg1);border-bottom:1px solid var(--b);position:sticky;top:0;z-index:50}
.mh-top{display:flex;align-items:center;gap:8px;padding:12px 16px 8px}
.mh-menu{display:none;width:44px;height:44px;align-items:center;justify-content:center;border-radius:var(--rs);color:var(--t1);cursor:pointer;transition:background var(--tr)}
.mh-menu:hover{background:var(--bgh)}
.mh-menu svg{width:18px;height:18px}
.vt{font-size:clamp(16px,3vw,20px);font-weight:800;flex:1;letter-spacing:-.3px}
.hact{display:flex;align-items:center;gap:5px}
.ibtn{
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--rs);color:var(--t1);cursor:pointer;transition:background var(--tr),color var(--tr);min-width:36px;
}
.ibtn:hover{background:var(--bgh);color:var(--t0)}
.ibtn svg{width:17px;height:17px}
.sw-wrap{position:relative;display:flex;align-items:center}
.sw-inp{
  background:var(--bg2);border:1px solid var(--b2);border-radius:var(--rs);
  padding:7px 10px 7px 32px;color:var(--t0);font-size:13px;width:200px;
  outline:none;transition:border-color var(--tr),width var(--tr);
}
.sw-inp:focus{border-color:var(--acc)}
.sw-inp::placeholder{color:var(--t2)}
.si-abs{position:absolute;left:9px;width:15px;height:15px;color:var(--t2);pointer-events:none}
.sw-wrap.col .sw-inp{width:0;padding:0;border-width:0;overflow:hidden}
/* Filter bar */
.fb{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:6px 16px 8px;background:var(--bg1);border-bottom:1px solid var(--b)}
.fc{
  display:flex;align-items:center;gap:3px;padding:4px 9px;border-radius:20px;
  background:var(--bg2);border:1px solid var(--b2);font-size:12px;color:var(--t1);
  cursor:pointer;transition:all var(--tr);white-space:nowrap;min-height:30px;
}
.fc:hover{background:var(--bgh);color:var(--t0)}
.fc.on{background:var(--acc-d);border-color:var(--acc);color:var(--acc-l)}
.sort-sel{
  background:var(--bg2);border:1px solid var(--b2);border-radius:var(--rs);
  padding:4px 7px;color:var(--t1);font-size:12px;cursor:pointer;outline:none;margin-left:auto;
}
.sort-sel:focus{border-color:var(--acc)}
/* Add bar */
.ab{padding:8px 14px;background:var(--bg1);border-bottom:1px solid var(--b);display:flex;gap:7px;align-items:center}
.ai{
  flex:1;background:var(--bg2);border:1px solid var(--b2);border-radius:var(--rs);
  padding:9px 12px;color:var(--t0);font-size:14px;outline:none;
  transition:border-color var(--tr);
}
.ai:focus{border-color:var(--acc)}
.ai::placeholder{color:var(--t2)}
.add-btn{
  padding:9px 14px;background:var(--acc);color:#fff;border-radius:var(--rs);
  font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;
  transition:opacity var(--tr),transform var(--tr);min-height:44px;
}
.add-btn:hover{opacity:.88}
.add-btn:active{transform:scale(.97)}
/* Task list */
#tl{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:8px 12px calc(8px + var(--navh) + var(--sb));
  scroll-behavior:smooth;
}

/* ====== TASK CARDS ====== */
.tc{
  position:relative;border-radius:var(--r);margin-bottom:4px;
  transition:box-shadow var(--tr),border-color var(--tr);
  will-change:transform;overflow:hidden;
}
.tc.sel .ti-inner{outline:2px solid var(--acc);outline-offset:-1px;border-radius:var(--r)}
.tc.drag-src{opacity:.4;transform:scale(.98)}
.tc.drag-ov .ti-inner{border-top:2px solid var(--acc)}
.tc.complete .tc-title{text-decoration:line-through;color:var(--t2)}

.d0{margin-left:0}.d1{margin-left:20px}.d2{margin-left:40px}
.d3{margin-left:60px}.d4{margin-left:80px}.d5{margin-left:100px}

/* swipe bg */
.sb-right{
  position:absolute;inset:0;background:var(--dn);
  display:flex;align-items:center;padding-left:16px;color:#fff;z-index:0;pointer-events:none;border-radius:var(--r);
}
.sb-right svg{width:22px;height:22px}
.sb-left{
  position:absolute;top:0;right:0;bottom:0;display:flex;z-index:0;pointer-events:none;border-radius:0 var(--r) var(--r) 0;overflow:hidden;
}
.sab{
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  width:70px;font-size:11px;font-weight:700;gap:2px;cursor:pointer;
}
.sab.edit{background:#3b82f6;color:#fff}
.sab.del{background:var(--ov);color:#fff}
.sab svg{width:17px;height:17px}

.ti-inner{
  position:relative;z-index:1;padding:10px 11px;display:flex;align-items:flex-start;gap:8px;
  background:var(--bgc);border:1px solid var(--b);border-radius:var(--r);
  will-change:transform;transition:border-color var(--tr),box-shadow var(--tr);
}
.ti-inner:hover{border-color:var(--b2);box-shadow:var(--sh)}

/* checkbox */
.ca{
  flex-shrink:0;width:28px;height:28px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;margin-top:1px;position:relative;
}
.cb{
  width:21px;height:21px;border-radius:50%;border:2px solid var(--b2);
  display:flex;align-items:center;justify-content:center;
  transition:all var(--tr);overflow:hidden;position:relative;
}
.cb.ck{border-color:var(--dn);background:var(--dn)}
.cb .ci{opacity:0;transform:scale(.3);transition:all var(--ts);color:#fff;width:13px;height:13px}
.cb.ck .ci{opacity:1;transform:scale(1)}
/* ink spread */
@keyframes ink{0%{transform:scale(0);opacity:.7}100%{transform:scale(3.5);opacity:0}}
.cb::after{
  content:'';position:absolute;inset:0;border-radius:50%;background:var(--dn);
  transform:scale(0);pointer-events:none;
}
.cb.ink::after{animation:ink .45s ease forwards}

/* progress arc */
.pa{width:24px;height:24px;flex-shrink:0;transform:rotate(-90deg)}
.pa .pt{fill:none;stroke:var(--b2);stroke-width:2.5}
.pa .pf{fill:none;stroke:var(--acc);stroke-width:2.5;stroke-linecap:round;transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)}

/* task content */
.tcc{flex:1;min-width:0}
.ttr{display:flex;align-items:flex-start;gap:5px;flex-wrap:wrap}
.exp-btn{
  width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  border-radius:4px;cursor:pointer;color:var(--t2);transition:all var(--tr);margin-top:2px;
}
.exp-btn:hover{background:var(--bgh);color:var(--t1)}
.exp-btn svg{width:12px;height:12px;transition:transform var(--tr)}
.exp-btn.op svg{transform:rotate(90deg)}
.tc-title{font-size:clamp(14px,2.5vw,14.5px);font-weight:500;color:var(--t0);line-height:1.45;flex:1;min-width:0;word-break:break-word}
@keyframes strike{from{width:0}to{width:100%}}
.tc.complete .tc-title::after{
  content:'';display:block;height:1px;background:var(--t1);
  animation:strike .3s ease forwards;
}
.pp{font-size:10px;font-weight:800;padding:2px 6px;border-radius:8px;flex-shrink:0;margin-top:2px;letter-spacing:.02em}
.pp.low{background:rgba(82,183,136,.14);color:var(--pl)}
.pp.medium{background:rgba(244,162,97,.14);color:var(--pm)}
.pp.high{background:rgba(230,57,70,.14);color:var(--ph)}
.tm{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}
.db{font-size:11px;font-weight:600;padding:2px 6px;border-radius:9px;display:flex;align-items:center;gap:3px;flex-shrink:0}
.db svg{width:11px;height:11px}
.db.od{background:rgba(230,57,70,.14);color:var(--ov)}
.db.td{background:rgba(244,162,97,.14);color:var(--dt)}
.db.sn{background:rgba(255,209,102,.14);color:var(--ds)}
.db.up{background:var(--bgh);color:var(--t1)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.od-pulse{animation:pulse 1.8s ease infinite}
.tgs{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.tg{font-size:10px;padding:1px 6px;border-radius:9px;background:var(--acc-d2);color:var(--acc-l);border:1px solid var(--acc-d)}
.ss{font-size:11px;color:var(--t2);display:flex;align-items:center;gap:3px}
.ri{color:var(--acc-l)}
.dh{padding:2px;cursor:grab;opacity:.2;display:flex;align-items:center;margin-left:auto;flex-shrink:0;margin-top:3px;transition:opacity var(--tr)}
.ti-inner:hover .dh{opacity:.45}
.dh:active{cursor:grabbing}
.dh svg{width:12px;height:12px}
.asb{
  display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--t2);
  cursor:pointer;padding:2px 6px;border-radius:var(--rx);transition:all var(--tr);margin-top:3px;min-height:28px;
}
.asb:hover{background:var(--bgh);color:var(--acc-l)}
.asb svg{width:11px;height:11px}

/* ====== CARD ANIMATIONS ====== */
@keyframes slideIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(.92)}}
@keyframes crack{
  0%{transform:none;filter:none}
  20%{transform:rotate(-1deg) translateX(-4px);filter:drop-shadow(2px 2px 8px rgba(124,106,255,.6))}
  40%{transform:rotate(1deg) translateX(4px);filter:drop-shadow(-2px 2px 8px rgba(124,106,255,.6))}
  60%{transform:rotate(0) translateX(-2px);filter:drop-shadow(0 4px 16px rgba(124,106,255,.7))}
  100%{transform:none;filter:none;opacity:0}
}
@keyframes childSlide{from{opacity:0;transform:translateY(-8px) scaleY(.85)}to{opacity:1;transform:none}}
.tc.entering{animation:slideIn .28s var(--ts) both}
.tc.leaving{animation:fadeOut .22s ease both;pointer-events:none}
.tc.cracking .ti-inner{animation:crack .5s ease forwards}
.tc.child-enter{animation:childSlide .32s var(--ts) both}

/* ====== DETAIL PANEL ====== */
#dp{
  position:fixed;top:var(--st);right:0;bottom:0;width:var(--dw);
  background:var(--bg1);border-left:1px solid var(--b);
  display:flex;flex-direction:column;overflow:hidden;z-index:150;
  transform:translateX(100%);transition:transform var(--tr);
  box-shadow:-6px 0 36px rgba(0,0,0,.25);padding-right:var(--sr);
}
#dp.open{transform:translateX(0)}
.dp-bd{position:fixed;inset:0;z-index:149;background:rgba(0,0,0,.2);display:none}
.dp-bd.vis{display:block}
.dph{padding:13px 14px;border-bottom:1px solid var(--b);display:flex;align-items:flex-start;gap:8px}
.dp-cl{
  width:32px;height:32px;min-width:32px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;cursor:pointer;color:var(--t1);transition:background var(--tr),color var(--tr);margin-top:1px;
}
.dp-cl:hover{background:var(--bgh);color:var(--t0)}
.dp-cl svg{width:15px;height:15px}
.dp-ti{
  flex:1;background:none;border:none;outline:none;color:var(--t0);
  font-size:clamp(15px,2.5vw,16px);font-weight:700;line-height:1.4;padding:0;
}
.dpb{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:13px}
.ds{display:flex;flex-direction:column;gap:6px}
.dl{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em}
.dn{
  background:var(--bg2);border:1px solid var(--b);border-radius:var(--rs);
  padding:8px 11px;color:var(--t0);font-size:13px;min-height:70px;
  outline:none;transition:border-color var(--tr);line-height:1.5;
}
.dn:focus{border-color:var(--acc)}
.dn::placeholder{color:var(--t2)}
.dr{display:flex;gap:6px}
.di{
  background:var(--bg2);border:1px solid var(--b);border-radius:var(--rs);
  padding:7px 8px;color:var(--t0);font-size:12.5px;outline:none;
  transition:border-color var(--tr);flex:1;min-height:36px;
}
.di:focus{border-color:var(--acc)}
input[type=date]::-webkit-calendar-picker-indicator,input[type=time]::-webkit-calendar-picker-indicator{filter:invert(.65);cursor:pointer}
[data-theme=light] input[type=date]::-webkit-calendar-picker-indicator,[data-theme=light] input[type=time]::-webkit-calendar-picker-indicator{filter:none}
.ps{display:flex;gap:4px}
.po{
  flex:1;padding:6px;border-radius:var(--rs);text-align:center;font-size:12px;font-weight:700;
  cursor:pointer;border:2px solid transparent;transition:all var(--tr);min-height:36px;
}
.po.low{background:rgba(82,183,136,.1);color:var(--pl)}
.po.medium{background:rgba(244,162,97,.1);color:var(--pm)}
.po.high{background:rgba(230,57,70,.1);color:var(--ph)}
.po.sel.low{border-color:var(--pl)}
.po.sel.medium{border-color:var(--pm)}
.po.sel.high{border-color:var(--ph)}
.ta{
  background:var(--bg2);border:1px solid var(--b);border-radius:var(--rs);
  padding:6px 8px;display:flex;flex-wrap:wrap;gap:5px;cursor:text;min-height:37px;
  transition:border-color var(--tr);
}
.ta:focus-within{border-color:var(--acc)}
.tagi{
  display:flex;align-items:center;gap:3px;background:var(--acc-d);
  color:var(--acc-l);padding:2px 6px;border-radius:10px;font-size:11.5px;
}
.tagi button{width:13px;height:13px;display:flex;align-items:center;justify-content:center;color:inherit;opacity:.6;transition:opacity var(--tr)}
.tagi button:hover{opacity:1}
.tagi button svg{width:9px;height:9px}
.txi{border:none;background:none;outline:none;color:var(--t0);font-size:12.5px;min-width:60px;flex:1}
.txi::placeholder{color:var(--t2)}
.tr-row{display:flex;align-items:center;justify-content:space-between;gap:7px}
.trl{font-size:13px;color:var(--t0);flex:1;display:flex;align-items:center;gap:5px}
.tog{
  width:42px;height:24px;background:var(--bgh);border-radius:12px;
  position:relative;cursor:pointer;transition:background var(--tr);flex-shrink:0;
}
.tog.on{background:var(--acc)}
.tog::after{
  content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;
  border-radius:50%;background:#fff;transition:transform var(--tr);box-shadow:0 1px 4px rgba(0,0,0,.3);
}
.tog.on::after{transform:translateX(18px)}
.dsel{
  background:var(--bg2);border:1px solid var(--b);border-radius:var(--rs);
  padding:7px 8px;color:var(--t0);font-size:12.5px;outline:none;cursor:pointer;width:100%;
}
.dsel:focus{border-color:var(--acc)}
.wt{font-size:11px;color:var(--dt);display:flex;align-items:center;gap:3px}
.wt svg{width:12px;height:12px}
.dpft{
  padding:10px 14px calc(10px + var(--sb));border-top:1px solid var(--b);display:flex;gap:7px;
}
.dp-del{
  padding:9px 12px;background:rgba(230,57,70,.1);color:var(--ov);border-radius:var(--rs);
  font-size:12.5px;font-weight:700;cursor:pointer;transition:background var(--tr);min-height:44px;
  display:flex;align-items:center;gap:4px;
}
.dp-del:hover{background:rgba(230,57,70,.2)}
.dp-del svg{width:13px;height:13px}
.dp-sv{
  flex:1;padding:9px;background:var(--acc);color:#fff;border-radius:var(--rs);
  font-size:13.5px;font-weight:700;cursor:pointer;transition:opacity var(--tr);min-height:44px;
}
.dp-sv:hover{opacity:.88}
.sub-row{
  display:flex;align-items:center;gap:7px;padding:6px 8px;
  background:var(--bg2);border-radius:var(--rs);margin-bottom:3px;
}
.sub-cb{
  width:17px;height:17px;min-width:17px;border-radius:50%;border:2px solid var(--b2);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all var(--tr);flex-shrink:0;
}
.sub-cb.ck{border-color:var(--dn);background:var(--dn)}
.sub-cb .ci{opacity:0;transform:scale(.3);transition:all var(--ts);color:#fff;width:10px;height:10px}
.sub-cb.ck .ci{opacity:1;transform:scale(1)}
.add-sub-det{
  display:flex;align-items:center;gap:5px;font-size:12.5px;color:var(--acc-l);
  padding:8px;border-radius:var(--rs);background:var(--acc-d2);width:100%;
  justify-content:center;cursor:pointer;transition:background var(--tr);
}
.add-sub-det:hover{background:var(--acc-d)}
.add-sub-det svg{width:13px;height:13px}

/* ====== BOTTOM NAV (MOBILE) ====== */
#bn{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:var(--bg1);border-top:1px solid var(--b);z-index:200;
  padding-bottom:var(--sb);
}
.bni{display:flex;height:56px}
.bni-t{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;cursor:pointer;color:var(--t2);font-size:10px;font-weight:600;
  transition:color var(--tr);min-width:44px;position:relative;
}
.bni-t svg{width:20px;height:20px}
.bni-t.act{color:var(--acc)}
.bni-badge{
  position:absolute;top:4px;right:calc(50% - 16px);background:var(--ov);color:#fff;
  font-size:9px;font-weight:800;padding:1px 4px;border-radius:7px;min-width:14px;text-align:center;
}

/* ====== BOTTOM SHEET ====== */
.bs-ov{
  position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:300;
  opacity:0;transition:opacity var(--tr);pointer-events:none;
}
.bs-ov.vis{pointer-events:all}
.bs-ov.show{opacity:1}
#bs{
  position:fixed;bottom:0;left:0;right:0;background:var(--bg1);border-radius:18px 18px 0 0;
  z-index:301;max-height:92dvh;transform:translateY(100%);
  transition:transform .34s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;padding-bottom:var(--sb);
}
#bs.show{transform:translateY(0)}
.bs-drag{
  width:38px;height:4px;background:var(--t2);border-radius:2px;
  margin:10px auto 2px;flex-shrink:0;cursor:grab;opacity:.35;
}
#bs-body{overflow-y:auto;flex:1}

/* ====== MOBILE SIDEBAR DRAWER ====== */
#mob-sb{
  display:none;position:fixed;inset:0;z-index:400;pointer-events:none;
}
#mob-sb.open{pointer-events:all;}
.msb-ov{position:absolute;inset:0;background:rgba(0,0,0,.5);opacity:0;transition:opacity var(--tr);}
#mob-sb.open .msb-ov{opacity:1;}
.msb-inner{
  position:absolute;top:0;left:0;bottom:0;width:min(var(--sw),80vw);
  background:var(--bg1);display:flex;flex-direction:column;overflow-y:auto;
  transform:translateX(-100%);transition:transform var(--tr);
  padding-top:var(--st);padding-left:var(--sl);box-shadow:6px 0 30px rgba(0,0,0,.35);
}
#mob-sb.open .msb-inner{transform:translateX(0)}

/* ====== MODAL ====== */
.mo{
  position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity var(--tr);padding:20px;
}
.mo.open{opacity:1;pointer-events:all}
.mo-box{
  background:var(--bg2);border-radius:16px;padding:22px;max-width:380px;width:100%;
  box-shadow:var(--shl);transform:scale(.94);transition:transform var(--tr);
}
.mo.open .mo-box{transform:scale(1)}
.mo-t{font-size:16px;font-weight:800;margin-bottom:9px;letter-spacing:-.2px}
.mo-tx{font-size:13.5px;color:var(--t1);margin-bottom:16px;line-height:1.55}
.mo-ac{display:flex;gap:8px;justify-content:flex-end}
.mb{padding:10px 16px;border-radius:var(--rs);font-size:13.5px;font-weight:700;cursor:pointer;transition:opacity var(--tr);min-height:44px}
.mb:hover{opacity:.85}
.mb.sec{background:var(--bgh);color:var(--t0)}
.mb.pri{background:var(--acc);color:#fff}
.mb.dan{background:var(--ov);color:#fff}

/* ====== TOAST ====== */
#tc2{
  position:fixed;top:calc(16px + var(--st));right:16px;z-index:600;
  display:flex;flex-direction:column;gap:6px;pointer-events:none;
}
.toast{
  background:var(--bg2);border:1px solid var(--b2);border-radius:var(--rs);
  padding:10px 14px;font-size:13px;box-shadow:var(--shl);
  display:flex;align-items:center;gap:8px;min-width:180px;max-width:300px;
  pointer-events:all;animation:ti .28s var(--ts) both;
}
.toast.out{animation:to .18s ease both}
.toast svg{width:15px;height:15px;flex-shrink:0}
.toast.success{border-left:3px solid var(--dn)}
.toast.error{border-left:3px solid var(--ov)}
.toast.info{border-left:3px solid var(--acc)}
.toast.warning{border-left:3px solid var(--ds)}
@keyframes ti{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes to{from{transform:translateX(0);opacity:1}to{transform:translateX(110%);opacity:0}}

/* ====== NOTIFICATION BANNER ====== */
#nb{
  position:fixed;top:calc(var(--st) + 4px);left:50%;transform:translateX(-50%);z-index:700;
  background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r);
  padding:10px 14px;display:flex;align-items:center;gap:10px;font-size:13px;
  box-shadow:var(--shl);max-width:min(90vw,460px);display:none;
}
#nb.vis{display:flex}
#nb svg{width:16px;height:16px;flex-shrink:0;color:var(--ds)}
.nb-txt{flex:1;font-size:12.5px;color:var(--t1)}
.nb-en{background:var(--acc);color:#fff;padding:5px 12px;border-radius:var(--rx);font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap;min-height:34px}
.nb-nt{background:var(--bgh);color:var(--t1);padding:5px 10px;border-radius:var(--rx);font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap;min-height:34px}

/* ====== MULTI-SELECT BAR ====== */
#msbar{
  position:fixed;bottom:calc(var(--navh) + var(--sb) + 12px);left:50%;
  transform:translateX(-50%) translateY(calc(100% + 20px));
  background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r);
  padding:8px 14px;display:flex;align-items:center;gap:10px;z-index:260;
  box-shadow:var(--shl);transition:transform var(--tr);white-space:nowrap;
  pointer-events:none;opacity:0;transition:transform var(--tr),opacity var(--tr);
}
#msbar.vis{transform:translateX(-50%) translateY(0);pointer-events:all;opacity:1}
.ms-cnt{font-size:13px;font-weight:700;color:var(--t0);margin-right:4px}
.ms-btn{padding:7px 12px;border-radius:var(--rs);font-size:12.5px;font-weight:700;cursor:pointer;transition:background var(--tr);min-height:36px}
.ms-btn.del{background:rgba(230,57,70,.15);color:var(--ov)}
.ms-btn.done{background:rgba(82,183,136,.15);color:var(--dn)}
.ms-btn.cls{background:var(--bgh);color:var(--t1)}
.ms-btn:hover{opacity:.8}

/* ====== STATS VIEW ====== */
#v-stats{padding:16px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:var(--bgc);border:1px solid var(--b);border-radius:var(--r);padding:14px 16px}
.stat-num{font-size:28px;font-weight:800;letter-spacing:-.5px}
.stat-lbl{font-size:12px;color:var(--t2);margin-top:2px}
.stat-num.acc{color:var(--acc-l)}
.stat-num.dn{color:var(--dn)}
.stat-num.ov{color:var(--ov)}

/* ====== SHOP VIEW ====== */
#v-shop{overflow-y:auto;height:100%;padding:14px 16px;display:block;min-height:unset}
.shop-section{margin-bottom:24px}
.shop-sh{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--b)}
.shop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:900px){.shop-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:540px){.shop-grid{grid-template-columns:1fr}}
.shop-card{
  background:var(--bgc);border:1.5px solid var(--b);border-radius:var(--r);
  overflow:hidden;display:flex;flex-direction:column;transition:border-color var(--tr),box-shadow var(--tr);
  position:relative;
}
.shop-card:hover{border-color:var(--b2);box-shadow:var(--sh)}
.shop-card.equipped{border-color:var(--acc);box-shadow:0 0 0 2px var(--acc-d)}
.shop-preview{height:96px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;flex-shrink:0}
.shop-preview-inner{
  width:90%;background:var(--bg2);border:1px solid var(--b2);border-radius:var(--rs);
  padding:7px 9px;font-size:12px;
}
.shop-info{padding:9px 10px;display:flex;flex-direction:column;gap:4px;flex:1}
.shop-name{font-size:13px;font-weight:700;color:var(--t0)}
.shop-desc{font-size:11px;color:var(--t2);line-height:1.4}
.shop-actions{display:flex;align-items:center;gap:6px;padding:8px 10px;border-top:1px solid var(--b)}
.shop-price{font-size:12px;font-weight:700;color:var(--ds)}
.shop-btn{
  padding:5px 12px;border-radius:var(--rx);font-size:12px;font-weight:700;cursor:pointer;
  transition:opacity var(--tr);min-height:32px;white-space:nowrap;
}
.shop-btn:hover{opacity:.82}
.shop-btn.buy{background:var(--acc);color:#fff}
.shop-btn.equip{background:var(--bg2);color:var(--t0);border:1px solid var(--b2)}
.shop-btn.equipped-btn{background:var(--acc-d);color:var(--acc-l);border:1px solid var(--acc-d);cursor:default}
.shop-owned-badge{
  font-size:10px;font-weight:700;color:var(--dn);background:rgba(82,183,136,.14);
  padding:2px 7px;border-radius:9px;white-space:nowrap;
}
.shop-lock{
  position:absolute;top:6px;right:7px;font-size:18px;opacity:.7;pointer-events:none;
}
.shop-settings{background:var(--bgc);border:1px solid var(--b);border-radius:var(--r);padding:12px 14px;margin-bottom:24px}
.shop-settings h3{font-size:13px;font-weight:700;margin-bottom:8px;color:var(--t1)}
.shop-set-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:5px 0}
.shop-set-lbl{font-size:13px;color:var(--t0)}

/* ====== COIN SPEND ANIMATION ====== */
@keyframes coinDrop{0%{transform:translateX(-50%) scale(1.1);opacity:1}100%{transform:translateX(-50%) translateY(30px) scale(.7);opacity:0}}
.coin-spend{
  position:fixed;top:calc(var(--st) + 12px);left:50%;transform:translateX(-50%);
  background:rgba(255,209,102,.15);border:1.5px solid var(--ds);color:var(--ds);
  padding:8px 18px;border-radius:30px;font-size:14px;font-weight:800;
  pointer-events:none;z-index:760;animation:coinDrop .8s cubic-bezier(.4,0,.6,1) forwards;
  white-space:nowrap;
}

/* ====== APP THEME OVERRIDES ====== */
/* crossfade transition */
html{transition:background .45s ease,color .45s ease}
#app,#sidebar,#main,.mh,.ab,#dp,#bs,#mob-sb .msb-inner,.ti-inner,.fo-pomo,.fo-task{transition:background .45s ease,border-color .45s ease,color .45s ease}

/* sakura */
html[data-apptheme=sakura]{
  --acc:#d64f8a;--acc-l:#f084b0;--acc-d:rgba(214,79,138,.18);--acc-d2:rgba(214,79,138,.08);
  --bg0:#fff0f5;--bg1:#fff7f9;--bg2:#ffffff;--bgc:#fff4f8;--bgh:#fce8f0;
  --t0:#2d1a24;--t1:#7a4a5e;--t2:#b88fa0;
  --b:rgba(214,79,138,.09);--b2:rgba(214,79,138,.18);
  --pl:#e05c8a;--pm:#f09050;--ph:#c0392b;--dn:#27ae60;
}
/* solarized */
html[data-apptheme=solarized]{
  --acc:#c87941;--acc-l:#e8a060;--acc-d:rgba(200,121,65,.18);--acc-d2:rgba(200,121,65,.08);
  --bg0:#1a1208;--bg1:#231a0e;--bg2:#2e2212;--bgc:#281e0c;--bgh:#362a18;
  --t0:#eedcba;--t1:#b09060;--t2:#7a6040;
  --b:rgba(200,121,65,.12);--b2:rgba(200,121,65,.22);
  --pl:#52b788;--pm:#e8a060;--ph:#e63946;--dn:#52b788;
}
/* cyberpunk */
html[data-apptheme=cyberpunk]{
  --acc:#ff0090;--acc-l:#ff4db8;--acc-d:rgba(255,0,144,.18);--acc-d2:rgba(255,0,144,.07);
  --bg0:#000000;--bg1:#0a0010;--bg2:#120020;--bgc:#0d0018;--bgh:#1a0028;
  --t0:#f0f000;--t1:#b0a030;--t2:#606010;
  --b:rgba(255,0,144,.14);--b2:rgba(255,0,144,.28);
  --pl:#00ff80;--pm:#ff9000;--ph:#ff0040;--dn:#00ff80;
}
/* aurora — animated gradient on bg0 */
html[data-apptheme=aurora]{
  --acc:#00d4aa;--acc-l:#30ecc0;--acc-d:rgba(0,212,170,.18);--acc-d2:rgba(0,212,170,.08);
  --bg1:#051018;--bg2:#081820;--bgc:#060e16;--bgh:#0c1e28;
  --t0:#d0f4e8;--t1:#7ab8a0;--t2:#3a6858;
  --b:rgba(0,212,170,.10);--b2:rgba(0,212,170,.20);
  --pl:#30ecc0;--pm:#f4a261;--ph:#e63946;--dn:#30ecc0;
}
@keyframes auroraShift{
  0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}
}
html[data-apptheme=aurora] body{
  background:linear-gradient(135deg,#020c14,#051828,#071e30,#030a18,#04121e,#061624);
  background-size:400% 400%;
  animation:auroraShift 12s ease infinite;
}
html[data-apptheme=aurora] #app{background:transparent}

/* ====== TASK SKIN OVERRIDES ====== */
/* neon */
.sk-neon .ti-inner{
  background:#050d14;border-color:#00f0f0;
  box-shadow:0 0 8px rgba(0,240,240,.35),inset 0 0 20px rgba(0,240,240,.04);
}
.sk-neon .tc-title{color:#b0f8f8}
@keyframes neonPulse{0%,100%{box-shadow:0 0 8px rgba(0,240,240,.35)}50%{box-shadow:0 0 18px rgba(0,240,240,.7)}}
.sk-neon .ti-inner:hover{animation:neonPulse 1.5s ease infinite}
.sk-neon .cb{border-color:#00f0f0}
.sk-neon .cb.ck{background:#00f0f0;border-color:#00f0f0}
.sk-neon .cb .ci{color:#050d14}
.sk-neon .pp{background:rgba(0,240,240,.12);color:#00f0f0}

/* paper */
.sk-paper .ti-inner{
  background:#fdf8ee;
  border:2px dashed #c8a87a;
  border-radius:4px;
  box-shadow:2px 2px 0 #e0c898;
  font-family:'Georgia',serif;
}
.sk-paper .tc-title{color:#3c2e18;font-family:'Georgia',serif}
.sk-paper .pp{background:rgba(139,90,43,.1);color:#7a5020}
.sk-paper.complete .tc-title{text-decoration:none}
.sk-paper.complete .tc-title::after{background:#7a5020;height:1.5px}
[data-theme=light] .sk-paper .ti-inner{background:#fdf8ee}

/* galaxy */
.sk-galaxy .ti-inner{
  background:#08061a;border-color:#4a3890;
  overflow:hidden;position:relative;
}
@keyframes starDrift{0%{transform:translateY(0)}100%{transform:translateY(-40px)}}
.sk-galaxy .ti-inner::before{
  content:'✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧';
  position:absolute;inset:-10px 0;font-size:10px;color:rgba(200,180,255,.25);
  letter-spacing:12px;line-height:1.8;pointer-events:none;z-index:0;
  animation:starDrift 8s linear infinite;white-space:pre-wrap;word-break:break-all;
}
.sk-galaxy .ti-inner > *{position:relative;z-index:1}
.sk-galaxy .tc-title{color:#d0c0ff}
.sk-galaxy .pp{background:rgba(120,80,255,.2);color:#c0a8ff}
.sk-galaxy .cb{border-color:#9068ff}
.sk-galaxy .cb.ck{background:linear-gradient(135deg,#6030d0,#9068ff);border-color:#9068ff}

/* fire */
.sk-fire .ti-inner{
  background:linear-gradient(135deg,#1a0800,#200c00);
  border-color:#c04000;
}
.sk-fire .tc-title{color:#ffd080}
.sk-fire .pp.low{background:rgba(82,183,136,.14);color:#52b788}
.sk-fire .pp.medium{background:rgba(255,120,0,.18);color:#ff7800}
.sk-fire .pp.high{background:rgba(255,40,0,.2);color:#ff4020}
.sk-fire .cb{border-color:#c04000}
.sk-fire .cb.ck{background:linear-gradient(135deg,#c04000,#ff8000);border-color:#ff8000}
.sk-fire.complete .tc-title::before{content:'🔥 ';font-style:normal}

/* forest */
.sk-forest .ti-inner{
  background:linear-gradient(135deg,#071208,#0c1e0e);
  border-color:#2a5c2a;
}
.sk-forest .tc-title{color:#a8e6a8}
.sk-forest .pp.low{background:rgba(82,183,136,.18);color:#52c878}
.sk-forest .pp.medium{background:rgba(130,180,80,.18);color:#82b450}
.sk-forest .pp.high{background:rgba(180,80,60,.18);color:#c05040}
.sk-forest .cb{border-color:#2a5c2a}
.sk-forest .cb.ck{background:#2a7a2a;border-color:#3a9a3a}
.sk-forest .ti-inner::after{
  content:'🌿';position:absolute;right:6px;bottom:4px;font-size:14px;
  opacity:.35;pointer-events:none;
}

/* retro */
.sk-retro .ti-inner{
  background:#001f00;
  border:2px solid #00cc00;
  border-radius:0;
  box-shadow:3px 3px 0 #00cc00,inset 0 0 24px rgba(0,204,0,.04);
  image-rendering:pixelated;
}
.sk-retro .tc-title{color:#00ff00;font-family:'Courier New',monospace;letter-spacing:.02em}
.sk-retro .pp{background:rgba(0,204,0,.12);color:#00cc00;border-radius:0;font-family:monospace}
.sk-retro .cb{border-color:#00cc00;border-radius:0}
.sk-retro .cb.ck{background:#00cc00;border-color:#00ff00;border-radius:0}
.sk-retro .cb .ci{color:#001f00}
@keyframes retroFlicker{0%,95%,100%{opacity:1}96%,98%{opacity:.4}}
.sk-retro .ti-inner{animation:retroFlicker 6s steps(1) infinite}

/* void */
@keyframes voidShimmer{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
@keyframes voidParticle{
  0%{opacity:0;transform:translateY(0) scale(.5)}
  20%{opacity:.7}
  100%{opacity:0;transform:translateY(-32px) scale(1.2)}
}
.sk-void .ti-inner{
  background:#000;
  border-color:#2a1a4a;
  box-shadow:0 0 0 1px #2a1a4a,0 0 24px rgba(90,40,180,.25),inset 0 0 40px rgba(40,0,80,.35);
}
.sk-void .ti-inner::before{
  content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;z-index:0;
  background:linear-gradient(270deg,#0d0020,#150030,#06001a,#1a0040,#0d0020);
  background-size:400% 400%;
  animation:voidShimmer 8s ease infinite;
  opacity:.6;
}
.sk-void .ti-inner::after{
  content:'·  ✦  ·  ✧  ·  ✦  ·  ✧  ·';
  position:absolute;bottom:4px;left:0;right:0;
  font-size:9px;color:rgba(160,100,255,.3);letter-spacing:6px;
  text-align:center;pointer-events:none;z-index:0;
  animation:voidParticle 4s ease-in-out infinite;
}
.sk-void .ti-inner > *{position:relative;z-index:1}
.sk-void .tc-title{color:#c8a8ff}
.sk-void .pp{background:rgba(120,40,255,.15);color:#b088ff}
.sk-void .pp.high{background:rgba(200,0,120,.18);color:#ff60c0}
.sk-void .cb{border-color:#6030c0}
.sk-void .cb.ck{background:linear-gradient(135deg,#3010a0,#8040ff);border-color:#9060ff}

/* sakura-card */
@keyframes petalDrift{
  0%{transform:translateX(0) rotate(0deg);opacity:.6}
  50%{transform:translateX(8px) rotate(15deg);opacity:.4}
  100%{transform:translateX(-4px) rotate(-10deg);opacity:.6}
}
.sk-sakura-card .ti-inner{
  background:linear-gradient(135deg,#fff5f8,#ffeaf2);
  border-color:#f0b8cc;
  box-shadow:0 2px 12px rgba(210,100,140,.12);
}
.sk-sakura-card .ti-inner::before{
  content:'🌸';position:absolute;top:4px;right:8px;font-size:16px;
  pointer-events:none;z-index:0;opacity:.4;
  animation:petalDrift 3s ease-in-out infinite;
}
.sk-sakura-card .ti-inner::after{
  content:'🌸';position:absolute;bottom:4px;left:10px;font-size:11px;
  pointer-events:none;z-index:0;opacity:.25;
  animation:petalDrift 4.5s ease-in-out infinite reverse;
}
.sk-sakura-card .ti-inner > *{position:relative;z-index:1}
.sk-sakura-card .tc-title{color:#7a2a3e;font-family:Georgia,serif}
.sk-sakura-card .pp{background:rgba(210,80,120,.1);color:#c0405e}
.sk-sakura-card .pp.low{background:rgba(120,180,120,.12);color:#3a7a3a}
.sk-sakura-card .pp.medium{background:rgba(210,120,60,.1);color:#a05020}
.sk-sakura-card .pp.high{background:rgba(200,40,60,.12);color:#c02030}
.sk-sakura-card .cb{border-color:#e890a8}
.sk-sakura-card .cb.ck{background:#e0607a;border-color:#e0607a}
.sk-sakura-card.complete .tc-title{color:#c09098}
[data-theme=dark] .sk-sakura-card .ti-inner{background:linear-gradient(135deg,#2a0e18,#350a20);border-color:#7a2a40}
[data-theme=dark] .sk-sakura-card .tc-title{color:#f0a8bc}

/* chrome */
@keyframes chromeSweep{
  0%{background-position:200% center}
  100%{background-position:-200% center}
}
.sk-chrome .ti-inner{
  background:linear-gradient(160deg,#2a2a30 0%,#3a3a42 30%,#4a4a52 50%,#3a3a42 70%,#2a2a30 100%);
  border-color:#606070;
  box-shadow:0 1px 0 rgba(255,255,255,.12) inset,0 -1px 0 rgba(0,0,0,.4) inset,
             2px 2px 8px rgba(0,0,0,.5),0 0 0 1px rgba(100,100,120,.3);
}
.sk-chrome .ti-inner::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.35) 40%,rgba(255,255,255,.5) 50%,rgba(255,255,255,.35) 60%,transparent);
  background-size:200% 100%;
  animation:chromeSweep 3s linear infinite;
  border-radius:inherit;pointer-events:none;z-index:2;
}
.sk-chrome .ti-inner::after{
  content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;z-index:0;
  background:linear-gradient(180deg,rgba(255,255,255,.06) 0%,transparent 60%);
}
.sk-chrome .ti-inner > *{position:relative;z-index:1}
.sk-chrome .tc-title{color:#e0e0e8;font-weight:600;letter-spacing:.01em}
.sk-chrome .pp{background:rgba(200,200,220,.12);color:#c0c0d0;border-radius:4px}
.sk-chrome .pp.high{background:rgba(220,80,60,.18);color:#ff9080}
.sk-chrome .cb{border-color:#8080a0;border-radius:3px}
.sk-chrome .cb.ck{background:linear-gradient(135deg,#5060a0,#8090c0);border-color:#9090b0;border-radius:3px}
[data-theme=light] .sk-chrome .ti-inner{
  background:linear-gradient(160deg,#d8d8e0 0%,#e8e8f0 30%,#f4f4f8 50%,#e8e8f0 70%,#d8d8e0 100%);
  border-color:#b0b0c0;
  box-shadow:0 1px 0 rgba(255,255,255,.8) inset,0 -1px 0 rgba(0,0,0,.1) inset,2px 2px 6px rgba(0,0,0,.15);
}
[data-theme=light] .sk-chrome .tc-title{color:#2a2a3a}

/* ====== SKIN: AETHER (Crystal Glassmorphism) ====== */
@keyframes prismShift{
  0%{background-position:0% 50%;opacity:.55}
  50%{background-position:100% 50%;opacity:.75}
  100%{background-position:0% 50%;opacity:.55}
}
@keyframes aetherGlow{
  0%,100%{box-shadow:0 0 8px rgba(120,200,255,.2),0 0 24px rgba(180,120,255,.12),inset 0 1px 0 rgba(255,255,255,.08)}
  50%{box-shadow:0 0 16px rgba(120,200,255,.38),0 0 40px rgba(180,120,255,.22),inset 0 1px 0 rgba(255,255,255,.18)}
}
.sk-aether .ti-inner{
  background:rgba(18,22,38,.55);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  border:1px solid rgba(160,180,255,.22);
  border-radius:16px;
  animation:aetherGlow 3.5s ease-in-out infinite;
  position:relative;overflow:hidden;
}
.sk-aether .ti-inner::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(120,200,255,.08) 0%,rgba(200,120,255,.06) 40%,rgba(255,200,120,.06) 70%,rgba(120,255,200,.08) 100%);
  background-size:300% 300%;
  animation:prismShift 6s ease infinite;
  border-radius:inherit;pointer-events:none;z-index:0;
}
.sk-aether .ti-inner::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(200,220,255,.6),rgba(220,180,255,.6),rgba(200,255,220,.5),transparent);
  background-size:200% 100%;
  animation:prismShift 4s linear infinite;
  pointer-events:none;z-index:2;
}
.sk-aether .ti-inner > *{position:relative;z-index:1}
.sk-aether .tc-title{color:#d8eaff;font-weight:500;text-shadow:0 0 12px rgba(160,200,255,.3)}
.sk-aether .pp{background:rgba(140,180,255,.12);color:#a8d0ff;border:1px solid rgba(140,180,255,.2)}
.sk-aether .pp.high{background:rgba(255,100,180,.12);color:#ffb0e0;border-color:rgba(255,100,180,.25)}
.sk-aether .pp.low{background:rgba(100,255,180,.1);color:#80f0c0;border-color:rgba(100,255,180,.2)}
.sk-aether .cb{border-color:rgba(160,200,255,.4);background:rgba(30,40,70,.5)}
.sk-aether .cb.ck{background:linear-gradient(135deg,rgba(80,150,255,.7),rgba(160,100,255,.7));border-color:rgba(180,220,255,.6);box-shadow:0 0 10px rgba(120,180,255,.4)}
.sk-aether.complete .tc-title{color:rgba(160,200,255,.5)}
[data-theme=light] .sk-aether .ti-inner{
  background:rgba(240,245,255,.7);
  border-color:rgba(120,160,255,.3);
}
[data-theme=light] .sk-aether .tc-title{color:#2a3a6a;text-shadow:none}

/* ====== SKIN: VOLCANO (Magma Flow) ====== */
@keyframes magmaPulse{
  0%,100%{box-shadow:0 0 8px rgba(255,80,0,.25),0 2px 20px rgba(200,30,0,.2),inset 0 0 30px rgba(255,60,0,.03)}
  40%{box-shadow:0 0 18px rgba(255,120,0,.4),0 4px 30px rgba(230,50,0,.32),inset 0 0 40px rgba(255,80,0,.07)}
  70%{box-shadow:0 0 12px rgba(255,60,0,.3),0 3px 22px rgba(200,20,0,.25),inset 0 0 35px rgba(255,40,0,.05)}
}
@keyframes lavaFlow{
  0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}
}
.sk-volcano .ti-inner{
  background:linear-gradient(160deg,#150500 0%,#1e0800 40%,#120200 100%);
  border:1.5px solid #6a1a00;
  border-radius:var(--r);
  animation:magmaPulse 2.8s ease-in-out infinite;
  position:relative;overflow:hidden;
}
.sk-volcano .ti-inner::before{
  content:'';position:absolute;bottom:-4px;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,#ff4400,#ff8800,#ff4400,transparent);
  background-size:200% 100%;
  animation:lavaFlow 3s linear infinite;
  pointer-events:none;z-index:0;opacity:.8;
}
.sk-volcano .ti-inner::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 100%,rgba(255,80,0,.08) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}
.sk-volcano .ti-inner > *{position:relative;z-index:1}
.sk-volcano .tc-title{color:#ffbb80;font-weight:500}
.sk-volcano .pp{background:rgba(255,80,0,.12);color:#ff9040;border-radius:6px}
.sk-volcano .pp.low{background:rgba(80,200,100,.1);color:#60c070}
.sk-volcano .pp.medium{background:rgba(255,160,0,.12);color:#ffb040}
.sk-volcano .pp.high{background:rgba(255,30,0,.18);color:#ff6050}
.sk-volcano .cb{border-color:#8a2a00;background:rgba(30,5,0,.6)}
.sk-volcano .cb.ck{background:linear-gradient(135deg,#c02000,#ff6600);border-color:#ff4400;box-shadow:0 0 12px rgba(255,80,0,.5)}
.sk-volcano .cb .ci{color:#fff8f0}
.sk-volcano.complete .tc-title{color:#804030;text-decoration:line-through}
.sk-volcano.complete .tc-title::before{content:'🌋 ';font-style:normal}
[data-theme=light] .sk-volcano .ti-inner{
  background:linear-gradient(160deg,#2a0800 0%,#3a1000 100%);
  border-color:#8a2800;
}

/* ====== CARD COMPLETION POP ANIMATION ====== */
@keyframes cardPop{
  0%{transform:scale(1)}
  40%{transform:scale(1.035)}
  70%{transform:scale(.985)}
  100%{transform:scale(1)}
}
.tc.completing{animation:cardPop .38s cubic-bezier(.34,1.56,.64,1) both}

/* ====== VIEW TRANSITION (slide + fade) ====== */
@keyframes viewIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes viewOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-16px)}}
.view-enter{animation:viewIn .25s cubic-bezier(.4,0,.2,1) both}

/* ====== DIFFICULTY METER ====== */
.diff-meter{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.diff-pip{
  height:22px;flex:1;border-radius:4px;cursor:pointer;
  transition:transform .15s,opacity .15s,box-shadow .15s;
  border:1.5px solid transparent;min-width:18px;
}
.diff-pip:hover{transform:scaleY(1.15);box-shadow:0 2px 8px rgba(0,0,0,.35)}
.diff-pip.active{border-color:rgba(255,255,255,.45);transform:scaleY(1.12)}
.diff-label{font-size:11px;font-weight:700;margin-left:4px;min-width:28px;color:var(--t1)}

/* pip colours: 1-3 green, 4-6 yellow, 7-9 red */
.dp1{background:#2d9e5a} .dp2{background:#34b864} .dp3{background:#52c97a}
.dp4{background:#a0c030} .dp5{background:#d4b020} .dp6{background:#f4a020}
.dp7{background:#f07030} .dp8{background:#e04020} .dp9{background:#c01020}

/* task card difficulty dot */
.diff-dot{
  display:inline-block;width:8px;height:8px;border-radius:50%;
  flex-shrink:0;margin-top:1px;
}

/* ====== QR SCANNER ====== */
.qr-scan-modal{
  position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.82);
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .22s;
}
.qr-scan-modal.open{opacity:1;pointer-events:all}
.qr-scan-box{
  background:var(--bg2);border-radius:16px;padding:22px;max-width:400px;width:100%;
  box-shadow:var(--shl);display:flex;flex-direction:column;gap:12px;
}
.qr-scan-title{font-size:15px;font-weight:800;color:var(--t0)}
.qr-scan-status{font-size:12.5px;color:var(--t1);min-height:18px}
#qr-reader-container{width:100%;border-radius:var(--rs);overflow:hidden;min-height:220px;background:#000;position:relative}
#qr-reader-container video{width:100%!important;height:auto!important}
.qr-scan-close{
  padding:10px 16px;border-radius:var(--rs);background:var(--bgh);color:var(--t0);
  font-size:13.5px;font-weight:700;cursor:pointer;transition:background var(--tr);min-height:44px;align-self:flex-end;
}
.qr-scan-close:hover{background:var(--b2)}

/* ====== HEADER SAVE BTN ====== */
.hact-save{
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--rs);color:var(--t1);cursor:pointer;
  transition:background var(--tr),color var(--tr),box-shadow .2s;min-width:36px;
}
.hact-save:hover{background:var(--bgh);color:var(--t0)}
.hact-save svg{width:17px;height:17px}
@keyframes savePulse{0%{box-shadow:0 0 0 0 rgba(82,183,136,.7)}70%{box-shadow:0 0 0 8px rgba(82,183,136,0)}100%{box-shadow:0 0 0 0 rgba(82,183,136,0)}}
.hact-save.pulsing{color:var(--dn)!important;animation:savePulse 1s ease}

/* ====== SAVE BTN ====== */
#save-fab{
  position:fixed;bottom:calc(var(--navh) + var(--sb) + 16px);right:16px;z-index:240;
  width:44px;height:44px;border-radius:50%;
  background:var(--bg2);border:1px solid var(--b2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--t1);transition:background var(--tr),color var(--tr),transform var(--tr),box-shadow var(--tr);
  box-shadow:var(--sh);
}
#save-fab:hover{background:var(--bgh);color:var(--t0);transform:scale(1.06)}
#save-fab:active{transform:scale(.94)}
#save-fab svg{width:18px;height:18px;transition:color var(--tr)}
@keyframes savePop{0%{transform:scale(1)}40%{transform:scale(1.22)}100%{transform:scale(1)}}
#save-fab.saved{background:rgba(82,183,136,.18);border-color:var(--dn);color:var(--dn);animation:savePop .35s var(--ts)}

/* ====== MOBILE IE TRAY (Import/Export in mob drawer) ====== */
.mob-ie-tray{
  display:flex;gap:6px;padding:8px 6px 4px;
}
.mob-ie-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  padding:10px 6px;border-radius:var(--rs);background:var(--bg2);border:1px solid var(--b2);
  cursor:pointer;color:var(--t1);font-size:11px;font-weight:600;
  transition:background var(--tr),color var(--tr);min-height:56px;
}
.mob-ie-btn:hover{background:var(--bgh);color:var(--t0)}
.mob-ie-btn span{font-size:20px;line-height:1}

/* ====== RESPONSIVE ====== */
@media(max-width:767px){
  :root{--navh:64px}
  #sidebar{display:none}
  #bn{display:block}
  #main{padding-bottom:var(--navh)}
  .mh-menu{display:flex}
  #dp{display:none!important}
  #mob-sb{display:block}
  .sw-inp{width:160px}
}
@media(min-width:768px){
  .bs-ov,#bs,#mob-sb,#bn{display:none!important}
  #save-fab{display:none}
}
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:48px 20px;gap:14px;color:var(--t2);text-align:center;
}
.empty-state svg{width:72px;height:72px;opacity:.35}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.empty-state svg{animation:float 3s ease-in-out infinite}
.empty-state h3{font-size:16px;font-weight:700;color:var(--t1)}
.empty-state p{font-size:13px;line-height:1.55;max-width:220px}

/* ====== ONBOARDING ====== */
.ott{
  position:fixed;z-index:800;background:var(--acc);color:#fff;border-radius:var(--r);
  padding:12px 16px;max-width:260px;font-size:13px;line-height:1.5;
  box-shadow:var(--shl);pointer-events:none;
}
.ott::before{
  content:'';position:absolute;width:10px;height:10px;background:var(--acc);transform:rotate(45deg);
}
.ott.bottom::before{top:-5px;left:20px}
.ott.top::before{bottom:-5px;left:20px}
.ott.right::before{left:-5px;top:14px}
.ott-title{font-weight:700;margin-bottom:4px;font-size:14px}
.ott-actions{display:flex;justify-content:flex-end;gap:7px;margin-top:10px}
.ott-skip{background:rgba(255,255,255,.2);border-radius:var(--rx);padding:5px 10px;font-size:12px;cursor:pointer;pointer-events:all}
.ott-next{background:#fff;color:var(--acc);border-radius:var(--rx);padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;pointer-events:all}

/* ====== CREDITS ====== */
@keyframes creditFloat{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-64px) scale(1.35)}}
.credit-float{font-size:16px;font-weight:800;color:var(--ds);animation:creditFloat 1.3s ease forwards;pointer-events:none;z-index:820;text-shadow:0 2px 8px rgba(0,0,0,.45);white-space:nowrap;position:fixed}
@keyframes bonusIn{0%{opacity:0;transform:translateX(-50%) translateY(-20px) scale(.82)}60%{transform:translateX(-50%) translateY(4px) scale(1.06)}100%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
@keyframes bonusOut{0%{opacity:1;transform:translateX(-50%) scale(1)}100%{opacity:0;transform:translateX(-50%) scale(.88)}}
#bonus-toast{
  position:fixed;top:72px;left:50%;transform:translateX(-50%);z-index:750;
  background:linear-gradient(135deg,var(--acc),var(--acc-l));color:#fff;
  padding:13px 26px;border-radius:50px;font-size:16px;font-weight:800;
  box-shadow:0 8px 36px rgba(124,106,255,.55);pointer-events:none;
  opacity:0;display:none;white-space:nowrap;letter-spacing:-.2px;
}
#bonus-toast.show{display:block;animation:bonusIn .45s var(--ts) forwards}
#bonus-toast.hiding{animation:bonusOut .3s ease forwards}
.sb-credits{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 10px;margin-bottom:3px;
  background:var(--acc-d2);border-radius:var(--rs);border:1px solid var(--acc-d);
}
#credit-balance{font-size:13.5px;font-weight:800;color:var(--acc-l);transition:color .15s}
.sb-focus-btn{
  padding:4px 10px;background:var(--acc);color:#fff;border-radius:var(--rx);
  font-size:11px;font-weight:700;cursor:pointer;transition:opacity var(--tr);min-height:26px;
}
.sb-focus-btn:hover{opacity:.85}

/* ====== STATS DASHBOARD ====== */
#v-stats{overflow-y:auto;height:100%;padding:14px 16px}
.stat-section{margin-bottom:18px}
.stat-sh{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--b)}
.css-bar-chart{display:flex;gap:5px;align-items:flex-end;height:90px}
.cbc-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%}
.cbc-bar-wrap{flex:1;width:100%;display:flex;align-items:flex-end}
.cbc-bar{width:100%;min-height:2px;border-radius:3px 3px 0 0;transition:height .5s cubic-bezier(.4,0,.2,1)}
.cbc-val{font-size:10px;font-weight:700;color:var(--t1)}
.cbc-lbl{font-size:10px;color:var(--t2)}
.cr-hist{background:var(--bgc);border:1px solid var(--b);border-radius:var(--rs);max-height:280px;overflow-y:auto}
.cr-hist-row{display:grid;grid-template-columns:1fr 1fr auto auto;gap:6px;align-items:center;padding:7px 10px;border-bottom:1px solid var(--b);font-size:11px}
.cr-hist-row:last-child{border-bottom:none}
.cr-hist-reason{color:var(--t0);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cr-hist-task{color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cr-hist-amt{color:var(--ds);font-weight:800;white-space:nowrap}
.cr-hist-time{color:var(--t2);font-size:10px;white-space:nowrap}

/* ====== FOCUS MODE ====== */
#focus-overlay{
  position:fixed;inset:0;background:var(--bg0);z-index:1000;
  display:none;flex-direction:column;overflow-y:auto;
  padding:var(--st) var(--sr) var(--sb) var(--sl);
}
#focus-overlay.open{display:flex}
.fo-inner{flex:1;display:flex;flex-direction:column;gap:18px;max-width:540px;margin:0 auto;width:100%;padding:16px 12px}
.fo-close{align-self:flex-end;padding:8px 14px;background:var(--bgh);color:var(--t1);border-radius:var(--rs);font-size:12.5px;font-weight:700;cursor:pointer;transition:background var(--tr),color var(--tr);min-height:40px}
.fo-close:hover{background:var(--bg2);color:var(--t0)}
.fo-task{background:var(--bgc);border:1px solid var(--b);border-radius:var(--r);padding:18px 20px;display:flex;flex-direction:column;gap:8px}
.fo-title{font-size:clamp(18px,4vw,26px);font-weight:800;letter-spacing:-.4px;line-height:1.3;color:var(--t0)}
.fo-notes{font-size:13.5px;color:var(--t1);line-height:1.55}
.fo-deadline{font-size:13px;font-weight:600;color:var(--dt)}
.fo-subs{display:flex;flex-direction:column;gap:5px;margin-top:4px}
.fo-sub{display:flex;align-items:center;gap:10px;padding:7px 10px;background:var(--bg2);border-radius:var(--rs);cursor:pointer;transition:background var(--tr);font-size:13px;min-height:40px}
.fo-sub:hover{background:var(--bgh)}
.fo-cb{width:20px;height:20px;min-width:20px;border-radius:50%;border:2px solid var(--b2);display:flex;align-items:center;justify-content:center;transition:all var(--tr);flex-shrink:0}
.fo-cb.ck{border-color:var(--dn);background:var(--dn)}
.fo-pomo{display:flex;flex-direction:column;align-items:center;gap:12px;background:var(--bgc);border:1px solid var(--b);border-radius:var(--r);padding:22px 18px}
.fo-mode-lbl{font-size:11px;font-weight:700;color:var(--t2);letter-spacing:.06em;text-transform:uppercase}
.fo-ring-wrap{position:relative;width:160px;height:160px}
.fo-ring{width:160px;height:160px;transform:rotate(-90deg)}
.fo-ring-track{fill:none;stroke:var(--b2);stroke-width:8}
.fo-ring-fill{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke .3s}
.fo-time{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(28px,8vw,36px);font-weight:800;letter-spacing:-.5px;color:var(--t0);font-variant-numeric:tabular-nums}
.fo-pomo-btns{display:flex;gap:10px}
.fo-btn{padding:11px 24px;background:var(--acc);color:#fff;border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer;transition:opacity var(--tr),transform var(--tr);min-height:48px}
.fo-btn:hover{opacity:.88}
.fo-btn:active{transform:scale(.97)}
.fo-btn.sec{background:var(--bgh);color:var(--t0)}
.fo-sessions{font-size:13px;color:var(--t1);font-weight:600}
.fo-credits-hint{font-size:11px;color:var(--t2)}
#confetti-canvas{position:fixed;inset:0;z-index:999;pointer-events:none;display:none}

/* ====== RESPONSIVE ====== */
@media(max-width:767px){
  :root{--navh:64px}
  #sidebar{display:none}
  #bn{display:block}
  #main{padding-bottom:var(--navh)}
  .mh-menu{display:flex}
  #dp{display:none!important}
  #mob-sb{display:block}
  .sw-inp{width:160px}
}
@media(min-width:768px){
  .bs-ov,#bs,#mob-sb,#bn{display:none!important}
}

/* ====== PROJECTS / KANBAN VIEW ====== */
#v-projects{display:none;flex-direction:column;height:100%;overflow:hidden}
#v-projects.active{display:flex}
/* Project tabs (Chrome-style) */
.proj-tabs{
  display:flex;gap:0;overflow-x:auto;overflow-y:hidden;
  background:var(--bg1);border-bottom:1px solid var(--b);
  flex-shrink:0;scrollbar-width:none;
}
.proj-tabs::-webkit-scrollbar{display:none}
.proj-tab{
  display:flex;align-items:center;gap:7px;padding:9px 16px;
  font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;
  border-right:1px solid var(--b);color:var(--t1);
  transition:background var(--tr),color var(--tr);flex-shrink:0;min-height:44px;
  position:relative;
}
.proj-tab:hover{background:var(--bgh);color:var(--t0)}
.proj-tab.act{
  background:var(--bg0);color:var(--acc-l);
  border-bottom:2px solid var(--acc);margin-bottom:-1px;
}
.proj-tab .pt-dot{
  width:8px;height:8px;border-radius:50%;background:var(--acc-d);flex-shrink:0;
}
.proj-tab.act .pt-dot{background:var(--acc)}
.proj-add-tab{
  display:flex;align-items:center;justify-content:center;
  padding:0 14px;color:var(--t2);cursor:pointer;font-size:18px;
  transition:color var(--tr);min-height:44px;min-width:44px;flex-shrink:0;
}
.proj-add-tab:hover{color:var(--acc-l)}
/* Kanban board */
.kanban-board{
  flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
  padding:14px;overflow-x:hidden;overflow-y:hidden;min-height:0;
}
@media(max-width:600px){
  .kanban-board{grid-template-columns:repeat(3,minmax(200px,1fr));overflow-x:auto}
}
.kb-col{
  background:var(--bg1);border:1px solid var(--b);border-radius:var(--r);
  display:flex;flex-direction:column;min-height:0;overflow:hidden;
}
.kb-col-hd{
  padding:10px 12px;font-size:11.5px;font-weight:800;letter-spacing:.04em;
  text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--b);flex-shrink:0;
}
.kb-todo .kb-col-hd{color:var(--t1)}
.kb-wip .kb-col-hd{color:var(--pm)}
.kb-done .kb-col-hd{color:var(--dn)}
.kb-col-hd .kb-cnt{
  font-size:11px;font-weight:700;padding:1px 7px;border-radius:10px;
  background:var(--bg2);color:var(--t2);
}
.kb-cards{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px}
.kb-cards::-webkit-scrollbar{width:4px}
.kb-cards::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
/* Drag-over highlight */
.kb-col.drag-over .kb-cards{
  background:var(--acc-d2);border-radius:0 0 var(--r) var(--r);
  outline:2px dashed var(--acc);outline-offset:-4px;
}
/* Kanban card */
.kb-card{
  background:var(--bgc);border:1px solid var(--b);border-radius:var(--rs);
  padding:9px 11px;cursor:grab;
  transition:box-shadow var(--tr),border-color var(--tr),transform var(--tr);
  will-change:transform;user-select:none;
}
.kb-card:hover{border-color:var(--b2);box-shadow:var(--sh)}
.kb-card:active{cursor:grabbing;transform:scale(.98)}
.kb-card.dragging{opacity:.4;transform:scale(.96)}
.kb-card-title{font-size:13px;font-weight:500;color:var(--t0);line-height:1.4;word-break:break-word}
.kb-card-title.done-title{text-decoration:line-through;color:var(--t2)}
.kb-card-meta{display:flex;align-items:center;gap:5px;margin-top:5px;flex-wrap:wrap}
.kb-pp{font-size:10px;font-weight:800;padding:1px 5px;border-radius:6px}
.kb-pp.low{background:rgba(82,183,136,.12);color:var(--pl)}
.kb-pp.medium{background:rgba(244,162,97,.12);color:var(--pm)}
.kb-pp.high{background:rgba(230,57,70,.12);color:var(--ph)}
.kb-sub-badge{font-size:10px;color:var(--acc-l);background:var(--acc-d2);padding:1px 5px;border-radius:6px}
.kb-proj-badge{font-size:9px;color:var(--dn);background:rgba(82,183,136,.1);padding:1px 5px;border-radius:6px;font-weight:800}
.kb-empty{
  text-align:center;padding:20px 12px;font-size:12px;color:var(--t2);
  border:1.5px dashed var(--b2);border-radius:var(--rs);
}
.proj-empty{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;color:var(--t2);padding:30px;text-align:center;
}
.proj-empty h3{font-size:16px;font-weight:700;color:var(--t1)}
.proj-empty p{font-size:13px;line-height:1.5;max-width:240px}
/* Make Project toggle in detail panel */
.mp-toggle-row{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:9px 0;border-top:1px solid var(--b);margin-top:4px;
}
.mp-lbl{font-size:13px;color:var(--t0);display:flex;align-items:center;gap:6px}
.mp-badge{
  display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;
  padding:3px 8px;border-radius:10px;background:var(--acc-d);color:var(--acc-l);
}

/* ====== IMPORT / EXPORT UI ====== */
.ie-modal-body{display:flex;flex-direction:column;gap:12px;max-height:70vh;overflow-y:auto}
.ie-textarea{
  width:100%;background:var(--bg0);border:1px solid var(--b2);border-radius:var(--rs);
  padding:9px 11px;color:var(--t0);font-size:11px;font-family:'Courier New',monospace;
  min-height:110px;outline:none;resize:vertical;line-height:1.45;
  transition:border-color var(--tr);word-break:break-all;
}
.ie-textarea:focus{border-color:var(--acc)}
.ie-btn-row{display:flex;gap:7px;flex-wrap:wrap}
.ie-btn{
  padding:9px 14px;border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;
  transition:opacity var(--tr),transform var(--tr);min-height:44px;white-space:nowrap;
  display:flex;align-items:center;gap:5px;
}
.ie-btn:hover{opacity:.85}
.ie-btn:active{transform:scale(.97)}
.ie-btn.pri{background:var(--acc);color:#fff}
.ie-btn.sec{background:var(--bgh);color:var(--t0);border:1px solid var(--b2)}
.ie-btn.grn{background:rgba(82,183,136,.15);color:var(--dn)}
.ie-preview{
  background:var(--bg0);border:1px solid var(--b2);border-radius:var(--rs);
  padding:12px 14px;font-size:13px;display:flex;flex-direction:column;gap:6px;
}
.ie-prev-row{display:flex;justify-content:space-between;font-size:12.5px}
.ie-prev-lbl{color:var(--t2)}
.ie-prev-val{font-weight:700;color:var(--t0)}
.ie-mode-row{display:flex;gap:8px;margin-top:2px}
.ie-mode-btn{
  flex:1;padding:10px 8px;border-radius:var(--rs);font-size:12.5px;font-weight:700;
  cursor:pointer;border:2px solid var(--b2);background:var(--bg2);color:var(--t1);
  transition:all var(--tr);min-height:44px;text-align:center;
}
.ie-mode-btn.sel{border-color:var(--acc);background:var(--acc-d);color:var(--acc-l)}
#qr-canvas{border-radius:var(--rs);display:block;margin:10px auto 0;image-rendering:pixelated;max-width:220px;width:100%}
@keyframes ieSuccess{0%{opacity:0;transform:scale(.88)}70%{transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
.ie-success{text-align:center;padding:20px 10px;animation:ieSuccess .45s var(--ts) both;display:flex;flex-direction:column;align-items:center;gap:10px}
.ie-success-icon{font-size:44px}
.ie-success-title{font-size:18px;font-weight:800;color:var(--dn)}
.ie-success-sub{font-size:13px;color:var(--t1);line-height:1.5}
.ie-file-label{
  display:flex;align-items:center;gap:6px;padding:9px 14px;border-radius:var(--rs);
  background:var(--bg2);border:1.5px dashed var(--b2);color:var(--t1);font-size:13px;
  cursor:pointer;transition:all var(--tr);min-height:44px;justify-content:center;
  position:relative;overflow:hidden;
}
.ie-file-label:hover{border-color:var(--acc);color:var(--acc-l)}
/* ====== FOREST VIEW ====== */
#v-forest{display:none;overflow-y:auto;padding:16px;flex-direction:column;gap:24px}
#v-forest.active{display:flex}
.forest-section-title{
  font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  color:var(--t2);padding-bottom:6px;border-bottom:1px solid var(--b);margin-bottom:4px;
}
.forest-grid{
  display:flex;flex-wrap:wrap;gap:14px 18px;align-items:flex-end;
  padding:12px 4px;
}
.tree-item{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:pointer;transition:transform .2s var(--ts);
  user-select:none;position:relative;
}
.tree-item:hover{transform:scale(1.12) translateY(-3px)}
.tree-emoji{
  line-height:1;display:block;
  animation:treeSway 3s ease-in-out infinite;
}
.tree-item:nth-child(2n)   .tree-emoji{animation-delay:-.8s}
.tree-item:nth-child(3n)   .tree-emoji{animation-delay:-1.6s}
.tree-item:nth-child(4n)   .tree-emoji{animation-delay:-.4s}
@keyframes treeSway{
  0%,100%{transform:rotate(-3deg) scale(1)}
  50%{transform:rotate(3deg) scale(1.04)}
}
.tree-emoji.glow{
  filter:drop-shadow(0 0 8px #ffd166) drop-shadow(0 0 16px rgba(255,209,102,.5));
  animation:treeSway 3s ease-in-out infinite,treeGlow 2s ease-in-out infinite;
}
@keyframes treeGlow{
  0%,100%{filter:drop-shadow(0 0 6px #ffd166) drop-shadow(0 0 14px rgba(255,209,102,.45))}
  50%{filter:drop-shadow(0 0 14px #ffb700) drop-shadow(0 0 28px rgba(255,183,0,.7))}
}
.tree-label{
  font-size:10px;color:var(--t2);text-align:center;
  max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3;
}
.tree-size-lg .tree-emoji{font-size:54px}
.tree-size-md .tree-emoji{font-size:40px}
.tree-size-sm .tree-emoji{font-size:28px}
.forest-empty{
  text-align:center;padding:50px 20px;color:var(--t2);
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.forest-empty .fe-icon{font-size:64px;opacity:.45}
.forest-empty p{font-size:13.5px;line-height:1.6;max-width:240px}
.forest-stats{
  display:flex;gap:10px;flex-wrap:wrap;padding:10px 4px 4px;
}
.forest-stat{
  background:var(--bg2);border:1px solid var(--b);border-radius:var(--rs);
  padding:7px 12px;font-size:12px;font-weight:700;color:var(--t1);
  display:flex;align-items:center;gap:6px;
}
.forest-stat span{color:var(--t0);font-size:14px}

/* ====== HIERARCHY BREADCRUMB ====== */
.hier-breadcrumb{
  display:flex;align-items:center;gap:0;
  background:var(--bg1);border-bottom:1px solid var(--b);
  padding:0 14px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;
  min-height:42px;
}
.hier-breadcrumb::-webkit-scrollbar{display:none}
.hier-crumb{
  display:flex;align-items:center;gap:6px;padding:9px 10px;
  font-size:13px;font-weight:600;color:var(--t2);cursor:pointer;
  white-space:nowrap;min-height:42px;border-radius:var(--rs);
  transition:color var(--tr),background var(--tr);flex-shrink:0;
}
.hier-crumb:hover{color:var(--t0);background:var(--bgh)}
.hier-crumb.root{color:var(--acc-l)}
.hier-crumb-sep{color:var(--t2);font-size:14px;flex-shrink:0;padding:0 2px}
.hier-crumb.current{color:var(--t0);font-weight:700}
.hier-back-btn{
  display:flex;align-items:center;gap:6px;padding:8px 12px;
  background:var(--acc-d);color:var(--acc-l);border-radius:var(--rs);
  font-size:12.5px;font-weight:700;cursor:pointer;
  transition:opacity var(--tr);min-height:34px;white-space:nowrap;flex-shrink:0;
}
.hier-back-btn:hover{opacity:.82}

/* ====== PWA INSTALL BANNER ====== */
#pwa-banner{
  position:fixed;top:calc(var(--st) + 6px);left:50%;transform:translateX(-50%);
  background:var(--bg2);border:1px solid var(--acc-d);border-radius:var(--r);
  padding:10px 14px;display:none;align-items:center;gap:10px;z-index:710;
  font-size:13px;box-shadow:var(--shl);max-width:min(92vw,420px);width:max-content;
}
#pwa-banner.vis{display:flex}
.pwa-txt{flex:1;font-size:12.5px;color:var(--t1)}
.pwa-add{background:var(--acc);color:#fff;padding:6px 13px;border-radius:var(--rx);font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap;min-height:34px}
.pwa-dis{background:var(--bgh);color:var(--t2);padding:6px 10px;border-radius:var(--rx);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;min-height:34px}
</style>
