// ══════════════════════════════════════════════════════════════════════════════
// V5 "TYPE-SWITCH" CODEC  ─ zero internal separators, type determines boundary
// ══════════════════════════════════════════════════════════════════════════════
//
// HEADER (between two '&'):
//   {digits=credits}&{digits=streak}{lc_letters=ownedSkins}{UC_letters=ownedThemes}{lc_or_0=eqSkin}{UC_or_0=eqTheme}&
//
//   Skin chars   → lowercase a-k  (neon:a paper:b galaxy:c fire:d forest:e retro:f void:g sakura-card:h chrome:i aether:j volcano:k)
//   Theme chars  → UPPERCASE A-D  (sakura:A solarized:B cyberpunk:C aurora:D)
//   default skin equipped → '0'  (digit, not a letter → unambiguous)
//   midnight theme equipped → '0'
//
// TASK (newline-separated, each ends with £):
//   {name}£{parent_name_or_#}£{data}£
//   data = {1 digit diff}{1 digit state}{lowercase_letters tags, max 26}{1 digit proj}
//     diff  : 1-9
//     state : 1 = todo, 2 = wip, 3 = done
//     tags  : a-z single chars (up to 26 global tags), empty if none
//     proj  : 0 or 1
//
// EXAMPLE:  Missione1£#£93abc1£
//   name=Missione1, parent=root, diff=9, state=3, tags={a,b,c}, proj=1
//
// TAG MAP footer (optional): |T:a=spesa,b=UI,...
// ══════════════════════════════════════════════════════════════════════════════

const V5_SKIN_ENC = { neon:'a', paper:'b', galaxy:'c', fire:'d', forest:'e', retro:'f',
                      void:'g', 'sakura-card':'h', chrome:'i', aether:'j', volcano:'k' };
const V5_SKIN_DEC = Object.fromEntries(Object.entries(V5_SKIN_ENC).map(([k,v])=>[v,k]));
const V5_THEME_ENC = { sakura:'A', solarized:'B', cyberpunk:'C', aurora:'D' };
const V5_THEME_DEC = Object.fromEntries(Object.entries(V5_THEME_ENC).map(([k,v])=>[v,k]));

// Build single-letter (a-z) tag alphabet — max 26 tags
function buildTagAlphaV5(tasks) {
  const tagSet = new Set();
  const walk = ts => { (ts||[]).forEach(t => {
    (t.tags||[]).forEach(g => tagSet.add(g));
    if (t.children?.length) walk(t.children);
  }); };
  walk(tasks);
  const sorted = [...tagSet].sort().slice(0, 26); // max 26
  const enc = {}, dec = {};
  sorted.forEach((tag, i) => {
    const code = String.fromCharCode(97 + i); // a-z
    enc[tag] = code; dec[code] = tag;
  });
  return { enc, dec };
}

// Encode the data block for one task: {diff}{state}{tagLetters}{proj}
function encodeV5Data(t, tagEnc) {
  const diff  = Math.max(1, Math.min(9, t.difficulty || 5));
  const state = t.isComplete ? 3 : (t.boardStatus === 'wip' ? 2 : 1);
  const tags  = (t.tags || []).map(g => tagEnc[g] || '').filter(Boolean).join('');
  const proj  = t.isProject ? 1 : 0;
  return `${diff}${state}${tags}${proj}`;
}

// Parse the data block char-by-char (TypeSwitch rules)
function decodeV5Data(data) {
  if (data.length < 3) return { diff:5, state:1, tags:'', proj:0 };
  const diff  = parseInt(data[0]) || 5;      // char[0] always digit → difficulty
  const state = parseInt(data[1]) || 1;      // char[1] always digit → state
  // chars[2..n-1]: read lowercase letters → tags, last char is always digit → proj
  let tags = '';
  let proj = 0;
  if (data.length === 3) {
    // no tags: format is "XY0" or "XY1"
    proj = parseInt(data[2]) || 0;
  } else {
    proj = parseInt(data[data.length - 1]) || 0;
    tags = data.slice(2, data.length - 1); // everything between state and proj
  }
  return { diff, state, tags, proj };
}

function collectV5Lines(tasks, parentName, tagEnc) {
  const lines = [];
  (tasks||[]).forEach(t => {
    const name   = t.title.replace(/£/g, '_');
    const parent = parentName ? parentName.replace(/£/g, '_') : '#';
    const data   = encodeV5Data(t, tagEnc);
    lines.push(`${name}£${parent}£${data}£`);
    if (t.children?.length) lines.push(...collectV5Lines(t.children, t.title, tagEnc));
  });
  return lines;
}

function generateDenseString() {
  const credits  = creditsData.balance || 0;
  const streak   = creditsData.streak  || 0;

  // Owned skins → lowercase a-k
  const skinStr  = shopData.ownedSkins
    .filter(s => s !== 'default')
    .map(s => V5_SKIN_ENC[s] || '').filter(Boolean).join('');
  // Owned themes → UPPERCASE A-D
  const themeStr = shopData.ownedThemes
    .filter(s => s !== 'midnight')
    .map(s => V5_THEME_ENC[s] || '').filter(Boolean).join('');
  // Equipped: single char each, '0' for defaults
  const eqSkin  = V5_SKIN_ENC[shopData.equippedSkin]   || '0';
  const eqTheme = V5_THEME_ENC[shopData.equippedTheme] || '0';

  // HEADER: credits&streakSkinsThemesEqSkinEqTheme&
  const header = `${credits}&${streak}${skinStr}${themeStr}${eqSkin}${eqTheme}&`;

  const { enc: tagEnc, dec: tagDec } = buildTagAlphaV5(state.tasks);
  const taskLines = collectV5Lines(state.tasks, null, tagEnc);

  // Tag map footer
  const tagMapStr = Object.entries(tagEnc).map(([tag,code]) => `${code}=${tag}`).join(',');
  const footer = tagMapStr ? `|T:${tagMapStr}` : '';

  return header + taskLines.join('\n') + footer;
}

function parseDenseString(str) {
  try {
    // Extract tag map
    const tagMatch = str.match(/\|T:(.+)$/);
    const tagDec = {};
    if (tagMatch) {
      tagMatch[1].split(',').forEach(p => {
        const eq = p.indexOf('=');
        if (eq > 0) { tagDec[p.slice(0, eq)] = p.slice(eq + 1); }
      });
    }
    const body = str.replace(/\|T:.+$/, '').trimEnd();

    const firstAmp  = body.indexOf('&');
    const secondAmp = body.indexOf('&', firstAmp + 1);
    if (firstAmp < 0 || secondAmp < 0) return null;

    const credits = parseInt(body.slice(0, firstAmp)) || 0;
    // Parse header block between the two &s (TypeSwitch)
    const hdr = body.slice(firstAmp + 1, secondAmp);
    let i = 0;
    // streak: leading digits
    let streakStr = '';
    while (i < hdr.length && hdr[i] >= '0' && hdr[i] <= '9') streakStr += hdr[i++];
    const streak = parseInt(streakStr) || 0;
    // owned skins: lowercase a-k
    let skinStr = '';
    while (i < hdr.length && hdr[i] >= 'a' && hdr[i] <= 'k') skinStr += hdr[i++];
    // owned themes: UPPERCASE A-D
    let themeStr = '';
    while (i < hdr.length && hdr[i] >= 'A' && hdr[i] <= 'D') themeStr += hdr[i++];
    // equipped skin: one char (lowercase a-k or '0')
    const eqSkinChar  = hdr[i]   || '0'; i++;
    // equipped theme: one char (UPPERCASE A-D or '0')
    const eqThemeChar = hdr[i]   || '0';

    const ownedSkins  = ['default', ...skinStr.split('').map(c => V5_SKIN_DEC[c]).filter(Boolean)];
    const ownedThemes = ['midnight', ...themeStr.split('').map(c => V5_THEME_DEC[c]).filter(Boolean)];

    // Parse task lines
    const taskSection = body.slice(secondAmp + 1);
    const flatList = taskSection.split('\n').filter(l => l.trim()).map(line => {
      // Each line ends with £ — format: name£parent£data£
      const stripped = line.endsWith('£') ? line.slice(0, -1) : line;
      const p1 = stripped.indexOf('£');
      const p2 = stripped.indexOf('£', p1 + 1);
      if (p1 < 0 || p2 < 0) return null;
      const name     = stripped.slice(0, p1);
      const parent   = stripped.slice(p1 + 1, p2);
      const dataStr  = stripped.slice(p2 + 1);
      const { diff, state: st, tags: tagsStr, proj } = decodeV5Data(dataStr);
      const isComplete  = st === 3;
      const boardStatus = st === 3 ? 'done' : st === 2 ? 'wip' : 'todo';
      const tags = tagsStr.split('').map(c => tagDec[c] || c).filter(Boolean);
      return {
        id: uid(), title: name.trim(),
        _parentName: parent === '#' ? null : parent,
        difficulty: diff, isComplete, boardStatus,
        isProject: proj === 1, tags,
        priority: 'medium', notes: '', dueDate: null, dueTime: null,
        reminderEnabled: false, reminderMinutesBefore: 10,
        createdAt: Date.now(), completedAt: isComplete ? Date.now() : null,
        children: [], skin: null, isRecurring: false, recurringInterval: 'daily', depth: 0
      };
    }).filter(Boolean);

    // Build tree (match by name, as before)
    const byName = {};
    flatList.forEach(t => { byName[t.title] = byName[t.title] || t; });
    const roots = [];
    flatList.forEach(t => {
      if (!t._parentName) { roots.push(t); }
      else {
        const par = byName[t._parentName];
        if (par) { t.parentId = par.id; t.depth = (par.depth || 0) + 1; par.children.push(t); }
        else { roots.push(t); }
      }
      delete t._parentName;
    });

    return {
      tasks: roots,
      credits: { balance: credits, lifetime: credits, history: [], streak, longestStreak: streak, lastDate: null },
      shop: {
        ownedSkins, ownedThemes,
        equippedSkin:  V5_SKIN_DEC[eqSkinChar]  || 'default',
        equippedTheme: V5_THEME_DEC[eqThemeChar] || 'midnight',
        defaultSkin: 'default'
      },
      settings: { theme: 'dark', appTheme: 'midnight' }
    };
  } catch(e) { console.warn('parseDenseString v5 error', e); return null; }
}

// Keep legacy PDF_SKIN_ENC/DEC aliases for any v4 strings still in the wild
const PDF_SKIN_ENC = V5_SKIN_ENC; const PDF_SKIN_DEC = V5_SKIN_DEC;
const PDF_THEME_ENC = { sakura:'a', solarized:'b', cyberpunk:'c', aurora:'d' };
const PDF_THEME_DEC = Object.fromEntries(Object.entries(PDF_THEME_ENC).map(([k,v])=>[v,k]));

// Legacy v4 helpers still referenced by buildTagAlphabet
function buildTagAlphabet(tasks) { return buildTagAlphaV5(tasks); }

// ── Smart parser: auto-detects v4 dense | v3 compact | v2 legacy ─────────────
function parseImportString(str) {
  const clean = str.trim().replace(/\s/g,'');

  // v5 TypeSwitch dense: starts with digits& and contains £ or newline after second &
  if (/^\d+&/.test(str.trim())) {
    const hydrated = parseDenseString(str.trim());
    if (hydrated) return { format: 'v5', hydrated };
  }

  let parsed = null;
  // Try base64 decode first
  try { parsed = JSON.parse(decodeURIComponent(escape(atob(clean)))); }
  catch(e) { try { parsed = JSON.parse(atob(clean)); } catch(e2) {} }
  // Fallback: might already be raw JSON
  if (!parsed) { try { parsed = JSON.parse(str.trim()); } catch(e) {} }
  if (!parsed) return null;

  // v3 compact: first element is number 3
  if (Array.isArray(parsed) && parsed[0] === 3) {
    return { format: 'v3', hydrated: hydrateState(parsed) };
  }
  // v2 legacy: has .tasks, .credits, .shop
  if (parsed && typeof parsed === 'object' && Array.isArray(parsed.tasks) && parsed.credits && parsed.shop) {
    return { format: 'v2', hydrated: {
      tasks: parsed.tasks,
      credits: parsed.credits,
      shop: parsed.shop,
      settings: parsed.settings || {},
      notifiedIds: parsed.notifiedIds || []
    }};
  }
  return null;
}

// ── QR CODE (pure JS + Canvas, no library) ───────────────────────────────────
// Minimal QR encoder: byte mode, ECC level M, versions 1-10
function drawQR(canvas, text) {
  const MAX = 800;
  if (text.length > MAX) {
    const ctx = canvas.getContext('2d');
    canvas.width = 220; canvas.height = 60;
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg2').trim() || '#1a1c26';
    ctx.fillRect(0,0,220,60);
    ctx.fillStyle = '#f4a261';
    ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Payload troppo grande per QR.', 110, 22);
    ctx.fillText('Usa Scarica .txt per condividere.', 110, 42);
    return;
  }
  const bytes = [];
  for (let i = 0; i < text.length; i++) {
    const c = text.charCodeAt(i);
    if (c < 0x80) bytes.push(c);
    else if (c < 0x800) { bytes.push(0xC0|(c>>6)); bytes.push(0x80|(c&0x3F)); }
    else { bytes.push(0xE0|(c>>12)); bytes.push(0x80|((c>>6)&0x3F)); bytes.push(0x80|(c&0x3F)); }
  }
  const capM = [0,16,28,44,64,86,108,124,154,182,216];
  let ver = 1;
  while (ver <= 10 && capM[ver] < bytes.length) ver++;
  if (ver > 10) ver = 10;
  const size = ver * 4 + 17;
  const modules = Array.from({length:size}, () => new Array(size).fill(null));
  function drawFinder(r,c) {
    for(let dr=-1;dr<=7;dr++) for(let dc=-1;dc<=7;dc++) {
      const nr=r+dr, nc=c+dc;
      if(nr<0||nr>=size||nc<0||nc>=size) continue;
      const inSq = dr>=0&&dr<=6&&dc>=0&&dc<=6;
      const edge = dr===0||dr===6||dc===0||dc===6;
      const inner = dr>=2&&dr<=4&&dc>=2&&dc<=4;
      modules[nr][nc] = inSq && (edge||inner) ? 1 : 0;
    }
  }
  drawFinder(0,0); drawFinder(0,size-7); drawFinder(size-7,0);
  for(let i=8;i<size-8;i++) {
    if(modules[6][i]===null) modules[6][i] = i%2===0?1:0;
    if(modules[i][6]===null) modules[i][6] = i%2===0?1:0;
  }
  modules[size-8][8] = 1;
  const dataBits = [];
  const push4 = n => { for(let i=3;i>=0;i--) dataBits.push((n>>i)&1); };
  const push8 = n => { for(let i=7;i>=0;i--) dataBits.push((n>>i)&1); };
  push4(4);
  if(ver<10) push8(bytes.length); else { push4(bytes.length>>8); push8(bytes.length&0xFF); }
  bytes.forEach(push8);
  for(let i=0;i<4&&dataBits.length<capM[ver]*8;i++) dataBits.push(0);
  while(dataBits.length%8) dataBits.push(0);
  const pads = [0xEC,0x11]; let pi=0;
  while(dataBits.length<capM[ver]*8) { push8(pads[pi%2]); pi++; }
  const dataBytes = [];
  for(let i=0;i<dataBits.length;i+=8) {
    let b=0; for(let j=0;j<8;j++) b=(b<<1)|(dataBits[i+j]||0); dataBytes.push(b);
  }
  let byteIdx=0, bitOff=7;
  function nextBit() {
    if(byteIdx>=dataBytes.length) return 0;
    const b=(dataBytes[byteIdx]>>bitOff)&1;
    bitOff--; if(bitOff<0){bitOff=7;byteIdx++;} return b;
  }
  const isReserved = (r,c) => modules[r][c] !== null;
  let up=true;
  for(let right=size-1;right>=1;right-=2) {
    if(right===6) right=5;
    for(let i=0;i<size;i++) {
      const row = up ? size-1-i : i;
      for(let col=0;col<2;col++) {
        const c = right-col;
        if(!isReserved(row,c)) modules[row][c] = nextBit();
      }
    }
    up=!up;
  }
  for(let r=0;r<size;r++) for(let c=0;c<size;c++) {
    if(modules[r][c]!==null && !isFinderOrTiming(r,c,size)) {
      if((r+c)%2===0) modules[r][c]^=1;
    }
  }
  const scale = Math.floor(220/size);
  const dim = scale*size;
  canvas.width = dim; canvas.height = dim;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,dim,dim);
  ctx.fillStyle = '#000000';
  for(let r=0;r<size;r++) for(let c=0;c<size;c++) {
    if(modules[r][c]) ctx.fillRect(c*scale, r*scale, scale, scale);
  }
}
function isFinderOrTiming(r,c,size) {
  if(r<9&&c<9) return true;
  if(r<9&&c>=size-8) return true;
  if(r>=size-8&&c<9) return true;
  if(r===6||c===6) return true;
  return false;
}

// ── EXPORT MODAL ─────────────────────────────────────────────────────────────
function openExportModal() {
  const modal = document.getElementById('export-modal');
  const body  = document.getElementById('export-body');
  modal.classList.add('open');

  // Always generate ALL THREE formats so user can pick
  const compStr   = generateShareString();             // v3 compact (QR-friendly)
  const denseStr  = generateDenseString();             // v4 dense (PDF spec)
  const legacyB64 = payloadToB64(buildExportPayload()); // v2 full JSON
  const taskCount = flatTasks().length;
  const isMobile  = window.innerWidth < 768;

  body.innerHTML = `
    <div style="font-size:12.5px;color:var(--t1);line-height:1.5">
      <strong>${taskCount} task</strong>, <strong>${creditsData.balance} ⭐</strong> —
      formato compresso per QR code o formato completo per backup sicuro.
    </div>
    <div style="display:flex;gap:6px;margin:4px 0 2px;flex-wrap:wrap">
      <button class="ie-mode-btn sel" id="fmt-compact">⚡ Compresso v3</button>
      <button class="ie-mode-btn" id="fmt-dense">📄 Denso v4</button>
      <button class="ie-mode-btn" id="fmt-full">📦 Completo</button>
    </div>
    <textarea class="ie-textarea" id="export-ta" readonly></textarea>
    <div class="ie-btn-row">
      <button class="ie-btn pri" id="ie-copy-btn">📋 Copia</button>
      <button class="ie-btn sec" id="ie-dl-btn">⬇️ Scarica .txt</button>
      ${isMobile && navigator.share ? '<button class="ie-btn sec" id="ie-share-btn">📤 Condividi</button>' : ''}
      <button class="ie-btn sec" id="ie-qr-btn">🔳 QR Code</button>
    </div>
    <div id="qr-wrap" style="display:none">
      <canvas id="qr-canvas"></canvas>
      <div style="font-size:11px;color:var(--t2);text-align:center;margin-top:5px">
        Scansiona con la fotocamera
      </div>
    </div>
    <div id="fmt-info" style="font-size:11px;color:var(--t2);margin-top:4px"></div>
  `;

  let currentStr = compStr;

  function setFmt(sel) {
    ['fmt-compact','fmt-dense','fmt-full'].forEach(id => {
      document.getElementById(id)?.classList.toggle('sel', id === sel);
    });
  }

  function refreshUI() {
    document.getElementById('export-ta').value = currentStr;
    const len = currentStr.length;
    document.getElementById('fmt-info').textContent =
      `${len} caratteri — ${len <= 800 ? '✅ QR compatibile' : '⚠️ Troppo lungo per QR, usa Scarica .txt'}`;
    const wrap = document.getElementById('qr-wrap');
    if (wrap.style.display !== 'none') {
      wrap.style.display = 'none';
      document.getElementById('ie-qr-btn').textContent = '🔳 QR Code';
    }
  }
  refreshUI();

  document.getElementById('fmt-compact').onclick = () => { currentStr = compStr;   setFmt('fmt-compact'); refreshUI(); };
  document.getElementById('fmt-dense').onclick   = () => { currentStr = denseStr;  setFmt('fmt-dense');   refreshUI(); };
  document.getElementById('fmt-full').onclick    = () => { currentStr = legacyB64; setFmt('fmt-full');    refreshUI(); };

  document.getElementById('ie-copy-btn').onclick = () => {
    const str = document.getElementById('export-ta').value;
    navigator.clipboard?.writeText(str).then(() => showToast('Copiato! 📋', 'success'))
      .catch(() => { document.getElementById('export-ta').select(); document.execCommand('copy'); showToast('Copiato!', 'success'); });
  };
  document.getElementById('ie-dl-btn').onclick = () => {
    const str = document.getElementById('export-ta').value;
    const blob = new Blob([str], {type:'text/plain'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `arborist-backup-${new Date().toISOString().slice(0,10)}.txt`;
    a.click(); setTimeout(()=>URL.revokeObjectURL(url),2000);
    showToast('Download avviato', 'info');
  };
  const shareBtn = document.getElementById('ie-share-btn');
  if (shareBtn) shareBtn.onclick = () => {
    navigator.share({ title:'Arborist Backup', text: document.getElementById('export-ta').value }).catch(()=>{});
  };
  document.getElementById('ie-qr-btn').onclick = () => {
    const wrap = document.getElementById('qr-wrap');
    const canvas = document.getElementById('qr-canvas');
    if (wrap.style.display === 'none') {
      wrap.style.display = 'block';
      drawQR(canvas, document.getElementById('export-ta').value);
      document.getElementById('ie-qr-btn').textContent = '🔳 Nascondi QR';
    } else {
      wrap.style.display = 'none';
      document.getElementById('ie-qr-btn').textContent = '🔳 QR Code';
    }
  };
}

// ── IMPORT MODAL ──────────────────────────────────────────────────────────────
let importPayloadCache = null;
let importMode = 'replace';

function openImportModal() {
  const modal = document.getElementById('import-modal');
  importPayloadCache = null;
  importMode = 'replace';
  modal.classList.add('open');
  document.getElementById('import-confirm-btn').style.display = 'none';
  renderImportBody();
}

function closeImportModal() {
  document.getElementById('import-modal').classList.remove('open');
  importPayloadCache = null;
}

function renderImportBody() {
  const body = document.getElementById('import-body');
  body.innerHTML = `
    <div style="font-size:12.5px;color:var(--t1)">
      Incolla la stringa di backup (compresso o completo) o seleziona un file .txt
    </div>
    <textarea class="ie-textarea" id="import-ta" placeholder="Incolla qui la stringa…" rows="4"></textarea>
    <div class="ie-btn-row" style="margin-top:-4px">
      <button class="ie-btn sec" id="ie-scan-qr-btn">📷 Scansiona QR</button>
    </div>
    <label class="ie-file-label" id="import-file-label" role="button" tabindex="0">
      <span style="font-size:18px">📂</span> Seleziona file .txt
      <input type="file" accept=".txt,text/plain" id="import-file"
        style="position:absolute;left:0;top:0;width:100%;height:100%;opacity:0;cursor:pointer;font-size:0">
    </label>
    <div id="import-preview-wrap"></div>
  `;
  const ta = document.getElementById('import-ta');
  ta.addEventListener('input', () => processImportString(ta.value));

  // Scan QR button
  document.getElementById('ie-scan-qr-btn')?.addEventListener('click', () => openQrScanner(str => {
    ta.value = str;
    processImportString(str);
  }));

  const fileInput = document.getElementById('import-file');
  const fileLabel = document.getElementById('import-file-label');
  fileLabel.addEventListener('click', e => { if (e.target === fileInput) return; fileInput.click(); });
  fileLabel.addEventListener('touchend', e => { e.preventDefault(); fileInput.click(); }, { passive: false });
  fileLabel.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); fileInput.click(); }});
  fileInput.addEventListener('change', () => {
    const f = fileInput.files[0]; if (!f) return;
    fileLabel.innerHTML = `<span style="font-size:18px">✅</span> ${f.name}`;
    const reader = new FileReader();
    reader.onload = ev => { ta.value = ev.target.result; processImportString(ev.target.result); };
    reader.readAsText(f);
  });
}

function processImportString(raw) {
  const confirmBtn = document.getElementById('import-confirm-btn');
  const wrap       = document.getElementById('import-preview-wrap');

  const result = parseImportString(raw);
  if (!result) {
    wrap.innerHTML = `<div style="font-size:12.5px;color:var(--ov);padding:8px 0">
      ⚠️ Formato non riconosciuto. Assicurati di incollare una stringa di backup Arborist valida.</div>`;
    confirmBtn.style.display = 'none';
    importPayloadCache = null;
    return;
  }

  importPayloadCache = result;
  const h = result.hydrated;
  const taskCount = countAllTasks(h.tasks);
  const bal    = h.credits?.balance || 0;
  const streak = h.credits?.streak || 0;
  const skins  = h.shop?.ownedSkins?.length || 0;
  const fmtBadge = result.format === 'v5'
    ? '<span style="background:#1a3a2a;color:#52c97a;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:800">TypeSwitch v5</span>'
    : result.format === 'v4'
    ? '<span style="background:#1a3a2a;color:#52c97a;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:800">Denso v4</span>'
    : result.format === 'v3'
    ? '<span style="background:var(--acc-d);color:var(--acc-l);padding:1px 6px;border-radius:8px;font-size:10px;font-weight:800">Compresso v3</span>'
    : '<span style="background:var(--bgh);color:var(--t1);padding:1px 6px;border-radius:8px;font-size:10px;font-weight:800">JSON v2</span>';

  wrap.innerHTML = `
    <div class="ie-preview">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em">Anteprima</span>
        ${fmtBadge}
      </div>
      <div class="ie-prev-row"><span class="ie-prev-lbl">Task totali</span><span class="ie-prev-val">${taskCount}</span></div>
      <div class="ie-prev-row"><span class="ie-prev-lbl">Saldo ⭐</span><span class="ie-prev-val">${bal} ⭐</span></div>
      <div class="ie-prev-row"><span class="ie-prev-lbl">Streak</span><span class="ie-prev-val">${streak} 🔥</span></div>
      <div class="ie-prev-row"><span class="ie-prev-lbl">Skin possedute</span><span class="ie-prev-val">${skins}</span></div>
    </div>
    <div style="font-size:12.5px;font-weight:700;color:var(--t1);margin:4px 0 2px">Modalità import</div>
    <div class="ie-mode-row">
      <button class="ie-mode-btn${importMode==='replace'?' sel':''}" id="im-rep">🔄 Sostituisci<br>
        <span style="font-size:10.5px;font-weight:400">Cancella dati attuali</span></button>
      <button class="ie-mode-btn${importMode==='merge'?' sel':''}" id="im-mrg">🔀 Unisci<br>
        <span style="font-size:10.5px;font-weight:400">Mantieni + aggiunge</span></button>
    </div>
  `;
  document.getElementById('im-rep').onclick = () => { importMode='replace'; processImportString(ta_val()); };
  document.getElementById('im-mrg').onclick = () => { importMode='merge';   processImportString(ta_val()); };
  confirmBtn.style.display = 'block';
}

function ta_val() { return document.getElementById('import-ta')?.value || ''; }

function countAllTasks(arr) {
  let n = 0;
  const walk = tasks => { (tasks||[]).forEach(t => { n++; if(t.children?.length) walk(t.children); }); };
  walk(arr);
  return n;
}

document.getElementById('import-confirm-btn')?.addEventListener('click', () => {
  if (!importPayloadCache) return;
  const h = importPayloadCache.hydrated;

  if (importMode === 'replace') {
    state.tasks = h.tasks;
    state.collapsed = {};
    creditsData = Object.assign(
      { balance:0, lifetime:0, history:[], streak:0, longestStreak:0, lastDate:null },
      h.credits
    );
    shopData = Object.assign(
      { ownedSkins:['default'], ownedThemes:['midnight'], equippedSkin:'default', equippedTheme:'midnight', defaultSkin:'default' },
      h.shop
    );
    if (h.notifiedIds) notifiedIds = new Set(h.notifiedIds);
    if (h.settings?.theme) {
      document.documentElement.dataset.theme = h.settings.theme;
      localStorage.setItem(THEME_KEY, h.settings.theme);
    }
  } else {
    // Merge mode
    const existingIds = new Set(flatTasks().map(t => t.id));
    const addForeign = tasks => {
      (tasks||[]).forEach(t => {
        if (!existingIds.has(t.id)) { state.tasks.push(t); existingIds.add(t.id); }
        if (t.children?.length) addForeign(t.children);
      });
    };
    addForeign(h.tasks);
    creditsData.balance      = Math.max(creditsData.balance||0, h.credits?.balance||0);
    creditsData.lifetime     = Math.max(creditsData.lifetime||0, h.credits?.lifetime||0);
    creditsData.streak       = Math.max(creditsData.streak||0,   h.credits?.streak||0);
    creditsData.longestStreak= Math.max(creditsData.longestStreak||0, h.credits?.longestStreak||0);
    const existTs = new Set((creditsData.history||[]).map(hh=>hh.ts));
    (h.credits?.history||[]).forEach(hh => { if(!existTs.has(hh.ts)) creditsData.history.push(hh); });
    const ns = new Set([...shopData.ownedSkins, ...(h.shop?.ownedSkins||[])]);
    const nt = new Set([...shopData.ownedThemes, ...(h.shop?.ownedThemes||[])]);
    shopData.ownedSkins  = [...ns];
    shopData.ownedThemes = [...nt];
    (h.notifiedIds||[]).forEach(id => notifiedIds.add(id));
  }

  save(); saveCredits(); saveShop(); saveNotified();
  applyEquippedTheme(shopData.equippedTheme, true);

  const taskCount = countAllTasks(state.tasks);
  const body = document.getElementById('import-body');
  body.innerHTML = `<div class="ie-success">
    <div class="ie-success-icon">✅</div>
    <div class="ie-success-title">Import completato!</div>
    <div class="ie-success-sub">${taskCount} task · ${creditsData.balance} ⭐ · ${shopData.ownedSkins.length} skin</div>
  </div>`;
  document.getElementById('import-confirm-btn').style.display = 'none';
  document.getElementById('import-close-btn').textContent = 'Chiudi';
  setTimeout(() => {
    closeImportModal();
    renderAll();
    animateCreditCount(creditsData.balance);
    showToast(`✅ Import riuscito: ${taskCount} task, ${creditsData.balance} ⭐`, 'success', 4000);
  }, 2200);
});

// Add export/import buttons to Stats view
function addStatsExportButtons(el) {

// === PWA ===
// FUTURE: Push Notifications via SW require a backend

function initPWA() {
  // Session counter for install banner
  const sessions = parseInt(localStorage.getItem(PWA_SESSION_KEY) || '0') + 1;
  localStorage.setItem(PWA_SESSION_KEY, String(sessions));

  // Listen for beforeinstallprompt (Android/Desktop Chrome)
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    pwaDeferred = e;
    if (sessions >= 3 && !localStorage.getItem('arborist_pwa_dismissed')) {
      document.getElementById('pwa-banner')?.classList.add('vis');
    }
  });

  // Banner buttons
  document.getElementById('pwa-add-btn')?.addEventListener('click', async () => {
    document.getElementById('pwa-banner')?.classList.remove('vis');
    if (pwaDeferred) {
      pwaDeferred.prompt();
      const choice = await pwaDeferred.userChoice;
      if (choice.outcome === 'accepted') showToast('🌳 Arborist aggiunto alla Home!', 'success');
    } else {
      // iOS instructions
      showToast('Su iOS: tocca 📤 → "Aggiungi alla schermata Home"', 'info', 5000);
    }
    localStorage.setItem('arborist_pwa_dismissed', '1');
  });
  document.getElementById('pwa-dis-btn')?.addEventListener('click', () => {
    document.getElementById('pwa-banner')?.classList.remove('vis');
    localStorage.setItem('arborist_pwa_dismissed', '1');
  });

  // iOS: show banner after 3 sessions if not installed and not dismissed
  const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isInStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if (isIos && !isInStandalone && sessions >= 3 && !localStorage.getItem('arborist_pwa_dismissed')) {
    document.getElementById('pwa-banner')?.classList.add('vis');
  }

  // Register Service Worker via Blob URL for full offline support
  if ('serviceWorker' in navigator) {
    const swCode = `
const CACHE = 'arborist-v1';
self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c =>
      c.addAll([self.location.href.replace(/\\/[^\\/]*$/, '') || '/'])
    ).catch(() => {})
  );
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    )
  );
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    caches.match(e.request).then(cached => {
      if (cached) return cached;
      return fetch(e.request).then(res => {
        if (!res || res.status !== 200 || res.type === 'opaque') return res;
        const clone = res.clone();
        caches.open(CACHE).then(c => c.put(e.request, clone));
        return res;
      }).catch(() => caches.match(e.request));
    })
  );
});
`;
    const blob = new Blob([swCode], {type:'application/javascript'});
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).then(reg => {
      // Cache the current page HTML for offline
      if ('caches' in window) {
        caches.open('arborist-v1').then(cache => {
          cache.put(location.href, new Response(document.documentElement.outerHTML, {
            headers: {'Content-Type':'text/html; charset=utf-8'}
          }));
        });
      }
    }).catch(() => {});
  }
}
